<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion — Registration Failed</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #F2F3F7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .shell { width: 100%; max-width: 390px; min-height: 100vh; background: #F2F3F7; display: flex; flex-direction: column; padding-bottom: 40px; }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; padding: 16px 20px 8px; }
        .avatar { width: 40px; height: 40px; background: #2563EB; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; }
        .fail-section { display: flex; flex-direction: column; align-items: center; padding: 48px 20px 0; animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both; }
        .fail-ring { width: 120px; height: 120px; border-radius: 50%; background: #FEF2F2; border: 5px solid #DC2626; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 12px rgba(220,38,38,.08), 0 12px 32px rgba(220,38,38,.18); margin-bottom: 24px; }
        .fail-ring svg { width: 56px; height: 56px; color: #DC2626; }
        .fail-title { font-size: 32px; font-weight: 700; color: #111827; letter-spacing: -.5px; }
        .fail-badge { margin-top: 10px; background: #FEF2F2; border: 1.5px solid #FECACA; border-radius: 20px; padding: 6px 18px; font-size: 14px; font-weight: 700; color: #DC2626; }
        .fail-desc { margin: 16px 20px 0; background: #fff; border-radius: 18px; padding: 18px 20px; box-shadow: 0 2px 10px rgba(0,0,0,.05); font-size: 14px; color: #6B7280; font-weight: 500; line-height: 1.6; text-align: center; }
        .nav-area { padding: 24px 20px 0; display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
        .btn-retry { width: 100%; padding: 16px; background: #2563EB; color: #fff; border: none; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; box-shadow: 0 4px 14px rgba(37,99,235,.3); transition: transform .15s; }
        .btn-retry:active { transform: scale(.975); }
        .btn-detail { width: 100%; padding: 15px; background: #fff; color: #6B7280; border: 1.5px solid #E5E7EB; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; transition: transform .15s; }
        .btn-detail:active { transform: scale(.975); }
        @keyframes popIn { 0% { opacity:0; transform:scale(.6); } 70% { transform:scale(1.04); } 100% { opacity:1; transform:scale(1); } }
    </style>
</head>
<body>
<div class="shell">
    <div class="top-bar"><div class="avatar" id="avatarEl">CW</div></div>
    <div class="fail-section">
        <div class="fail-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
        <div class="fail-title">Registration Failed</div>
        <div class="fail-badge">Could Not Connect</div>
    </div>
    <div class="fail-desc">The rail could not be registered on the network. Check that the rail is powered on and the LEDs flashed on startup, then try again.</div>
    <div class="nav-area">
        <a href="#" class="btn-retry" id="btnRetry">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.84"/></svg>
            Try Again
        </a>
        <a href="#" class="btn-detail" id="btnDetail">Back to Rail Detail</a>
    </div>
</div>
<script>
    (function() {
        const p = new URLSearchParams(window.location.search);
        const aisle = p.get('aisle')||'C3', section = p.get('section')||'2', rail = p.get('rail')||'Z001-0123';
        const userName = sessionStorage.getItem('userName') || 'CW';
        document.getElementById('avatarEl').textContent = userName.slice(0,2).toUpperCase();
        const rp = '?aisle=' + aisle + '&section=' + section + '&rail=' + encodeURIComponent(rail);
        document.getElementById('btnRetry').href  = 'rail_scan.html' + rp;
        document.getElementById('btnDetail').href = 'rail_detail.html' + rp + '&status=issues';
    })();
</script>
</body>
</html>
