<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion - Registering</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F2F3F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #F2F3F7;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Top bar ── */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 16px 20px 8px;
        }

        /* Avatar doubles as hidden trigger for intervention path */

        /* Persistent selection pill */
        .selected-pill { flex: 1; background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 12px; padding: 7px 14px; display: flex; align-items: center; justify-content: space-between; min-width: 0; }
        .pill-label { font-size: 10px; font-weight: 700; color: #2563EB; text-transform: uppercase; letter-spacing: .4px; }
        .pill-value { font-size: 16px; font-weight: 800; color: #2563EB; }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Hero ── */
        .hero {
            padding: 24px 20px 0;
            text-align: center;
            animation: fadeUp 0.4s ease both;
        }
        .hero-title {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            line-height: 1.2;
        }
        .hero-sub {
            font-size: 14px;
            color: #6B7280;
            margin-top: 6px;
            line-height: 1.5;
        }

        /* ── Rail image ── */
        .rail-img-wrap {
            margin-top: 32px;
            animation: float 3s ease-in-out infinite;
        }
        .rail-img-wrap img {
            width: 220px;
            height: auto;
            object-fit: contain;
        }
        .rail-img-placeholder {
            width: 220px;
            height: 80px;
            background: linear-gradient(135deg, #e0e7ef, #c7d2e0);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .rail-img-placeholder svg { width: 40px; height: 40px; color: #94A3B8; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        /* ── Spinner ── */
        /* Tapping the spinner activates the standard failure demo path */
        .spinner-container {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 40px;
            cursor: pointer;
        }

        .spinner-bg {
            position: absolute;
            width: 176px;
            height: 176px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 8px 28px rgba(0,0,0,0.08);
            z-index: 1;
            border: 2px solid #E5E7EB;
        }

        /* Outer dashed ring */
        .spinner-ring {
            position: absolute;
            width: 216px;
            height: 216px;
            border-radius: 50%;
            border: 6px dashed #BFDBFE;
            animation: spin 6s linear infinite;
            z-index: 2;
        }

        /* Inner progress arc */
        .spinner-ring-inner {
            position: absolute;
            width: 196px;
            height: 196px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top: 3px solid #2563EB;
            border-right: 3px solid #2563EB;
            animation: spin-reverse 2s linear infinite;
            z-index: 2;
        }

        .spinner-text {
            position: relative;
            z-index: 3;
            text-align: center;
            pointer-events: none;
        }
        .spinner-main {
            font-size: 15px;
            font-weight: 700;
            color: #111827;
            letter-spacing: 0.3px;
        }
        .spinner-sub {
            font-size: 12px;
            color: #9CA3AF;
            margin-top: 4px;
            font-weight: 500;
        }

        @keyframes spin         { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="phone-shell">

    <!-- Top bar — avatar is hidden trigger for intervention/3rd-failure path -->
    <div class="top-bar">
        <div class="selected-pill">
            <div class="pill-label">Selected</div>
            <div class="pill-value" id="topPill">—</div>
        </div>
        <div class="avatar" onclick="triggerIntervention()">CW</div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <div class="hero-title">Registering Rail</div>
        <div class="hero-sub">Connecting to the network…</div>
    </div>

    <!-- Floating rail image -->
    <div class="rail-img-wrap">
        <img src="rail-loading.jpg" alt="Rail"
             onerror="this.parentElement.innerHTML='<div class=\'rail-img-placeholder\'><svg viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'1.5\'><rect x=\'2\' y=\'8\' width=\'20\' height=\'8\' rx=\'2\'/><line x1=\'5\' y1=\'11\' x2=\'5\' y2=\'13\'/><line x1=\'8\' y1=\'11\' x2=\'8\' y2=\'13\'/><line x1=\'11\' y1=\'11\' x2=\'11\' y2=\'13\'/><line x1=\'14\' y1=\'11\' x2=\'14\' y2=\'13\'/></svg></div>'">
    </div>

    <!-- Spinner — tap to activate standard failure demo path -->
    <div class="spinner-container" onclick="setFailurePath()">
        <div class="spinner-ring"></div>
        <div class="spinner-ring-inner"></div>
        <div class="spinner-bg"></div>
        <div class="spinner-text">
            <div class="spinner-main">Processing</div>
            <div class="spinner-sub">Please wait…</div>
        </div>
    </div>

</div>

<script>
    let nextPage = 'page8.html';

    // Auto-redirect after 4 seconds
    window.onload = function () {
        setTimeout(function () {
            window.location.href = nextPage;
        }, 4000);
    };

    // Tap spinner → demo the standard single-failure path
    function setFailurePath() {
        nextPage = 'page9.html';
    }

    // Tap CW avatar → demo the persistent/intervention failure path
    function triggerIntervention() {
        window.location.href = 'fail-intervention.html';
    }
</script>

</body>
</html>
