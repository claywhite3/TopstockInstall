<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion - Connection Failed</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F2F3F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #F2F3F7;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 16px 20px 8px;
        }


        /* Persistent selection pill */
        .selected-pill { flex: 1; background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 12px; padding: 7px 14px; display: flex; align-items: center; justify-content: space-between; min-width: 0; }
        .pill-label { font-size: 10px; font-weight: 700; color: #2563EB; text-transform: uppercase; letter-spacing: .4px; }
        .pill-value { font-size: 16px; font-weight: 800; color: #2563EB; }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        /* ── Failure graphic ── */
        .failure-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 20px 0;
            animation: shakeIn 0.5s ease both;
        }

        .x-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #FEF2F2;
            border: 4px solid #DC2626;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 10px rgba(220,38,38,0.07), 0 10px 28px rgba(220,38,38,0.15);
            margin-bottom: 20px;
        }
        .x-ring svg { width: 44px; height: 44px; color: #DC2626; }

        .failure-title {
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            line-height: 1.1;
        }
        .failure-badge {
            margin-top: 10px;
            background: #FEF2F2;
            border: 1.5px solid #FECACA;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 14px;
            font-weight: 700;
            color: #DC2626;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .failure-badge svg { width: 14px; height: 14px; }

        @keyframes shakeIn {
            0%   { opacity: 0; transform: translateX(-12px); }
            25%  { transform: translateX(10px); }
            50%  { transform: translateX(-6px); }
            75%  { transform: translateX(4px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* ── Troubleshoot card ── */
        .troubleshoot-card {
            margin: 24px 20px 0;
            background: #fff;
            border-radius: 20px;
            padding: 18px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            animation: fadeUp 0.4s 0.15s ease both;
        }

        .troubleshoot-label {
            font-size: 11px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
        }

        .trouble-steps {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .trouble-step {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-num {
            width: 28px;
            height: 28px;
            background: #FEF2F2;
            border: 1.5px solid #FECACA;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 700;
            color: #DC2626;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .trouble-step span {
            font-size: 14px;
            color: #374151;
            font-weight: 500;
            line-height: 1.4;
        }

        /* ── Action buttons ── */
        .action-section {
            padding: 24px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
            animation: fadeUp 0.4s 0.25s ease both;
        }

        /* Primary — retry */
        .btn-retry {
            width: 100%;
            padding: 17px 20px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-retry:active { transform: scale(0.975); box-shadow: 0 2px 6px rgba(37,99,235,0.2); }
        .btn-retry svg { width: 17px; height: 17px; }

        /* Secondary — back options */
        .btn-secondary {
            width: 100%;
            padding: 15px 20px;
            background: #fff;
            color: #374151;
            border: 1.5px solid #E5E7EB;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.15s;
            text-decoration: none;
        }
        .btn-secondary:active { transform: scale(0.975); }
        .btn-secondary svg { width: 16px; height: 16px; color: #9CA3AF; }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="phone-shell">

    <!-- Top bar -->
    <div class="top-bar" style="position:relative;">
        <a href="flow_pick.html" style="position:absolute;left:50%;transform:translateX(-50%);width:38px;height:38px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);text-decoration:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <div class="avatar">CW</div>
    </div>
    <div style="padding: 6px 20px 0;">
        <div class="selected-pill">
            <div class="pill-label">Selected</div>
            <div class="pill-value" id="topPill">—</div>
        </div>
    </div>

    <!-- Failure graphic -->
    <div class="failure-section">
        <div class="x-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </div>
        <div class="failure-title">Connection Failed</div>
        <div class="failure-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Rail did not come online
        </div>
    </div>

    <!-- Troubleshoot card -->
    <div class="troubleshoot-card">
        <div class="troubleshoot-label">Try these steps</div>
        <div class="trouble-steps">
            <div class="trouble-step">
                <div class="step-num">1</div>
                <span>Verify the Rail ID was scanned correctly</span>
            </div>
            <div class="trouble-step">
                <div class="step-num">2</div>
                <span>Unplug the battery and wait 30 seconds</span>
            </div>
            <div class="trouble-step">
                <div class="step-num">3</div>
                <span>Plug the battery back in firmly</span>
            </div>
        </div>
    </div>

    <!-- Action buttons -->
    <div class="action-section">

        <button class="btn-retry" onclick="window.location.href='page7.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.84"/></svg>
            Retry Connection
        </button>

        <a href="page6.html" class="btn-secondary">
            <span>Re-scan Rail ID</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>

        <a href="page5.html" class="btn-secondary">
            <span>Back to Battery Instructions</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>

    </div>

</div>

<script>
    const aisle   = sessionStorage.getItem('selectedAisle')   || '—';
    const section = sessionStorage.getItem('selectedSection') || '—';
    const _pill = document.getElementById('topPill');
    if (_pill) _pill.textContent = aisle + '-' + section;
</script>

</body>
</html>
