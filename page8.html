<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion - Success</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F2F3F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #F2F3F7;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 8px;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .selected-pill { flex: 1; background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 12px; padding: 7px 14px; display: flex; align-items: center; justify-content: space-between; min-width: 0; }
        .pill-label { font-size: 10px; font-weight: 700; color: #2563EB; text-transform: uppercase; letter-spacing: .4px; }
        .pill-value { font-size: 16px; font-weight: 800; color: #2563EB; }

        .skip-link { text-align: center; margin-top: -4px; }
        .skip-link button { background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: #9CA3AF; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
        .skip-link button:active { opacity: .6; }

        .flag-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
        .flag-overlay.open { opacity: 1; pointer-events: all; }
        .flag-sheet { background: #fff; border-radius: 24px 24px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 390px; transform: translateY(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); }
        .flag-overlay.open .flag-sheet { transform: translateY(0); }
        .flag-icon-wrap { width: 48px; height: 48px; background: #FFFBEB; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; font-size: 22px; }
        .flag-title { font-size: 18px; font-weight: 800; color: #111827; }
        .flag-body  { font-size: 14px; color: #6B7280; margin-top: 6px; line-height: 1.6; }
        .flag-field-label { font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .5px; margin-top: 16px; margin-bottom: 6px; }
        .flag-input { width: 100%; background: #F9FAFB; border: 1.5px solid #E5E7EB; border-radius: 12px; padding: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #111827; outline: none; transition: border-color .15s; resize: none; }
        .flag-input:focus { border-color: #D97706; box-shadow: 0 0 0 3px rgba(217,119,6,0.1); }
        .flag-btns { display: flex; gap: 10px; margin-top: 16px; }
        .flag-cancel { flex: 1; padding: 14px; background: #F3F4F6; color: #374151; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
        .flag-submit { flex: 2; padding: 14px; background: #D97706; color: #fff; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(217,119,6,0.3); }

        /* ── Success graphic ── */
        .success-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 20px 0;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .check-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #F0FDF4;
            border: 5px solid #16A34A;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 12px rgba(22,163,74,0.08), 0 12px 32px rgba(22,163,74,0.18);
            margin-bottom: 24px;
        }

        .check-ring svg {
            width: 56px;
            height: 56px;
            color: #16A34A;
        }

        .success-title {
            font-size: 32px;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .success-badge {
            margin-top: 10px;
            background: #DCFCE7;
            border: 1.5px solid #86EFAC;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 14px;
            font-weight: 700;
            color: #16A34A;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .success-badge svg { width: 14px; height: 14px; }

        @keyframes popIn {
            0%   { opacity: 0; transform: scale(0.6); }
            70%  { transform: scale(1.04); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ── Rail info card ── */
        .rail-card {
            margin: 28px 20px 0;
            background: #fff;
            border-radius: 20px;
            padding: 18px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            animation: fadeUp 0.4s 0.2s ease both;
        }

        .rail-card-label {
            font-size: 11px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .rail-meta-row {
            display: flex;
            gap: 10px;
        }

        .rail-meta-chip {
            flex: 1;
            background: #F8FAFC;
            border: 1.5px solid #E5E7EB;
            border-radius: 12px;
            padding: 10px 12px;
            text-align: center;
        }
        .chip-label {
            font-size: 10px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chip-value {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
            margin-top: 2px;
        }
        .chip-value.green { color: #16A34A; }

        /* ── Action buttons ── */
        .action-section {
            padding: 24px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: auto;
            animation: fadeUp 0.4s 0.3s ease both;
        }

        .btn-next-rail {
            width: 100%;
            padding: 18px 20px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
        }
        .btn-next-rail:active { transform: scale(0.975); box-shadow: 0 2px 6px rgba(37,99,235,0.2); }

        .btn-label-wrap { text-align: left; }
        .btn-eyebrow {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.75;
            letter-spacing: 0.3px;
        }
        .btn-main-text {
            font-size: 16px;
            font-weight: 700;
            margin-top: 1px;
        }

        .btn-arrow-circle {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .btn-arrow-circle svg { width: 18px; height: 18px; }

        .btn-new-aisle {
            width: 100%;
            padding: 17px 20px;
            background: #fff;
            color: #374151;
            border: 1.5px solid #E5E7EB;
            border-radius: 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.15s;
            text-decoration: none;
        }
        .btn-new-aisle:active { transform: scale(0.975); }
        .btn-new-aisle svg { width: 18px; height: 18px; color: #6B7280; }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="phone-shell">

    <!-- Top bar -->
    <div class="top-bar">
        <div class="selected-pill">
            <div class="pill-label">Selected</div>
            <div class="pill-value" id="topPill">—</div>
        </div>
        <div class="avatar">CW</div>
    </div>

    <!-- Success graphic -->
    <div class="success-section">
        <div class="check-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <div class="success-title">Rail Registered</div>
        <div class="success-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l2.5 2.5L16 9"/></svg>
            Online &amp; Active
        </div>
    </div>

    <!-- Rail summary card -->
    <div class="rail-card">
        <div class="rail-card-label">Just Registered</div>
        <div class="rail-meta-row">
            <div class="rail-meta-chip">
                <div class="chip-label">Aisle</div>
                <div class="chip-value" id="chipAisle">—</div>
            </div>
            <div class="rail-meta-chip">
                <div class="chip-label">Section</div>
                <div class="chip-value" id="chipSection">—</div>
            </div>
            <div class="rail-meta-chip">
                <div class="chip-label">Rail ID</div>
                <div class="chip-value green">4Z1-9S8TW</div>
            </div>
        </div>
    </div>

    <!-- Action buttons -->
    <div class="action-section">

        <!-- Continue installing next rail in same section -->
        <button class="btn-next-rail" onclick="goNextRail()">
            <div class="btn-label-wrap">
                <div class="btn-eyebrow">Install Next Rail</div>
                <div class="btn-main-text" id="nextRailLabel">Next Rail in Section</div>
            </div>
            <div class="btn-arrow-circle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </div>
        </button>

        <div class="skip-link">
            <button onclick="openFlagModal()">Skip this rail</button>
        </div>

        <!-- Start a whole new aisle -->
        <a href="page3.html" class="btn-new-aisle">
            <span>Start a New Aisle</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>

    </div>

</div>

<script>
    const aisle   = sessionStorage.getItem('selectedAisle')   || '—';
    const section = sessionStorage.getItem('selectedSection') || '—';

    document.getElementById('chipAisle').textContent   = aisle;
    document.getElementById('chipSection').textContent = section;
    document.getElementById('topPill').textContent     = aisle + '-' + section;

    const currentSection = parseInt(section, 10);
    const nextSection    = isNaN(currentSection) ? null : currentSection + 1;

    if (nextSection && nextSection <= 30) {
        document.getElementById('nextRailLabel').textContent = 'Aisle ' + aisle + '  ·  Section ' + nextSection;
    } else {
        document.getElementById('nextRailLabel').textContent = 'Install Another Rail';
    }

    function goNextRail() {
        if (nextSection && nextSection <= 30) {
            sessionStorage.setItem('selectedSection', String(nextSection));
        }
        window.location.href = 'page5.html';
    }

    function openFlagModal() {
        const skipSec = nextSection && nextSection <= 30 ? nextSection : currentSection;
        document.getElementById('flagSecInput').value = aisle + '-' + skipSec;
        document.getElementById('flagNotes').value = '';
        document.getElementById('flagModal').classList.add('open');
    }

    function closeFlagModal() {
        document.getElementById('flagModal').classList.remove('open');
    }

    function submitFlag() {
        const notes = document.getElementById('flagNotes').value.trim();
        if (!notes) { document.getElementById('flagNotes').focus(); return; }

        const skipSec    = nextSection && nextSection <= 30 ? nextSection : currentSection;
        const afterSkip  = skipSec + 1;

        // Store flag for supervisor review
        const flags = JSON.parse(sessionStorage.getItem('installFlags') || '[]');
        flags.push({ aisle, section: skipSec, notes, ts: Date.now(), installer: 'CW' });
        sessionStorage.setItem('installFlags', JSON.stringify(flags));

        // Mark skipped section as flagged in section state
        try {
            const key  = 'sectionState_' + aisle;
            const data = JSON.parse(sessionStorage.getItem(key) || '{"installed":[],"flagged":{}}');
            data.installed = (data.installed || []).filter(s => s !== skipSec);
            data.flagged   = data.flagged || {};
            data.flagged[skipSec] = notes;
            sessionStorage.setItem(key, JSON.stringify(data));
        } catch(e) {}

        closeFlagModal();

        // Advance past the skipped section
        if (afterSkip <= 30) {
            sessionStorage.setItem('selectedSection', String(afterSkip));
            document.getElementById('topPill').textContent = aisle + '-' + afterSkip;
            const afterAfter = afterSkip + 1;
            document.getElementById('nextRailLabel').textContent =
                afterAfter <= 30 ? 'Aisle ' + aisle + '  ·  Section ' + afterAfter : 'Install Another Rail';
            document.getElementById('flagSecInput').value = aisle + '-' + afterSkip;
            showToast('Section ' + aisle + '-' + skipSec + ' skipped — now on section ' + afterSkip);
        } else {
            showToast('All sections complete — returning to aisle select');
            setTimeout(() => { window.location.href = 'page3.html'; }, 1500);
        }
    }

    function showToast(msg) {
        const t = document.createElement('div');
        t.textContent = msg;
        t.style.cssText = 'position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:400;opacity:0;transition:opacity .2s;white-space:nowrap;max-width:340px;text-align:center;';
        document.body.appendChild(t);
        requestAnimationFrame(() => { t.style.opacity='1'; setTimeout(() => { t.style.opacity='0'; setTimeout(() => t.remove(), 200); }, 2500); });
    }
</script>

<!-- Flag modal -->
<div class="flag-overlay" id="flagModal">
    <div class="flag-sheet">
        <div class="flag-icon-wrap">🚩</div>
        <div class="flag-title">Skip This Rail</div>
        <div class="flag-body">Describe what's preventing installation. A supervisor will review this flag.</div>
        <div class="flag-field-label">Section</div>
        <input type="text" class="flag-input" id="flagSecInput" readonly>
        <div class="flag-field-label">Notes</div>
        <textarea class="flag-input" id="flagNotes" rows="3" placeholder="e.g. Shelf bracket missing, can't mount rail"></textarea>
        <div class="flag-btns">
            <button class="flag-cancel" onclick="closeFlagModal()">Cancel</button>
            <button class="flag-submit" onclick="submitFlag()">Submit &amp; Skip</button>
        </div>
    </div>
</div>

</body>
</html>
