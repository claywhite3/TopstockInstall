<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion - Success</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F2F3F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #F2F3F7;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px 20px 8px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ── Success graphic ── */
        .success-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 20px 0;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .check-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #F0FDF4;
            border: 5px solid #16A34A;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 12px rgba(22,163,74,0.08), 0 12px 32px rgba(22,163,74,0.18);
            margin-bottom: 24px;
        }

        .check-ring svg {
            width: 56px;
            height: 56px;
            color: #16A34A;
        }

        .success-title {
            font-size: 32px;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .success-badge {
            margin-top: 10px;
            background: #DCFCE7;
            border: 1.5px solid #86EFAC;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 14px;
            font-weight: 700;
            color: #16A34A;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .success-badge svg { width: 14px; height: 14px; }

        @keyframes popIn {
            0%   { opacity: 0; transform: scale(0.6); }
            70%  { transform: scale(1.04); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ── Rail info card ── */
        .rail-card {
            margin: 28px 20px 0;
            background: #fff;
            border-radius: 20px;
            padding: 18px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            animation: fadeUp 0.4s 0.2s ease both;
        }

        .rail-card-label {
            font-size: 11px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .rail-meta-row {
            display: flex;
            gap: 10px;
        }

        .rail-meta-chip {
            flex: 1;
            background: #F8FAFC;
            border: 1.5px solid #E5E7EB;
            border-radius: 12px;
            padding: 10px 12px;
            text-align: center;
        }
        .chip-label {
            font-size: 10px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chip-value {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
            margin-top: 2px;
        }
        .chip-value.green { color: #16A34A; }

        /* ── Action buttons ── */
        .action-section {
            padding: 24px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: auto;
            animation: fadeUp 0.4s 0.3s ease both;
        }

        .btn-next-rail {
            width: 100%;
            padding: 18px 20px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
        }
        .btn-next-rail:active { transform: scale(0.975); box-shadow: 0 2px 6px rgba(37,99,235,0.2); }

        .btn-label-wrap { text-align: left; }
        .btn-eyebrow {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.75;
            letter-spacing: 0.3px;
        }
        .btn-main-text {
            font-size: 16px;
            font-weight: 700;
            margin-top: 1px;
        }

        .btn-arrow-circle {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .btn-arrow-circle svg { width: 18px; height: 18px; }

        .btn-new-aisle {
            width: 100%;
            padding: 17px 20px;
            background: #fff;
            color: #374151;
            border: 1.5px solid #E5E7EB;
            border-radius: 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.15s;
            text-decoration: none;
        }
        .btn-new-aisle:active { transform: scale(0.975); }
        .btn-new-aisle svg { width: 18px; height: 18px; color: #6B7280; }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="phone-shell">

    <!-- Top bar -->
    <div class="top-bar">
        <div class="avatar">CW</div>
    </div>

    <!-- Success graphic -->
    <div class="success-section">
        <div class="check-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <div class="success-title">Rail Registered</div>
        <div class="success-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l2.5 2.5L16 9"/></svg>
            Online &amp; Active
        </div>
    </div>

    <!-- Rail summary card -->
    <div class="rail-card">
        <div class="rail-card-label">Just Registered</div>
        <div class="rail-meta-row">
            <div class="rail-meta-chip">
                <div class="chip-label">Aisle</div>
                <div class="chip-value" id="chipAisle">—</div>
            </div>
            <div class="rail-meta-chip">
                <div class="chip-label">Section</div>
                <div class="chip-value" id="chipSection">—</div>
            </div>
            <div class="rail-meta-chip">
                <div class="chip-label">Rail ID</div>
                <div class="chip-value green">4Z1-9S8TW</div>
            </div>
        </div>
    </div>

    <!-- Action buttons -->
    <div class="action-section">

        <!-- Continue installing next rail in same section -->
        <button class="btn-next-rail" onclick="goNextRail()">
            <div class="btn-label-wrap">
                <div class="btn-eyebrow">Install Next Rail</div>
                <div class="btn-main-text" id="nextRailLabel">Next Rail in Section</div>
            </div>
            <div class="btn-arrow-circle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </div>
        </button>

        <!-- Start a whole new aisle -->
        <a href="page3.html" class="btn-new-aisle">
            <span>Start a New Aisle</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>

    </div>

</div>

<script>
    // Pull context from sessionStorage (set by earlier pages)
    const aisle   = sessionStorage.getItem('selectedAisle')   || '—';
    const section = sessionStorage.getItem('selectedSection') || '—';

    // Display in the summary card — aisle is the full code (e.g. "G14"), section is the number
    document.getElementById('chipAisle').textContent   = aisle;
    document.getElementById('chipSection').textContent = section;

    // Work out the next modular section number
    const currentSection = parseInt(section, 10);
    const nextSection    = isNaN(currentSection) ? null : currentSection + 1;

    if (nextSection && nextSection <= 30) {
        document.getElementById('nextRailLabel').textContent =
            'Aisle ' + aisle + '  ·  Section ' + nextSection;
    } else {
        document.getElementById('nextRailLabel').textContent = 'Install Another Rail';
    }

    function goNextRail() {
        // Pre-fill the next section in sessionStorage so page4 can pick it up
        if (nextSection && nextSection <= 30) {
            sessionStorage.setItem('selectedSection', String(nextSection));
        }
        window.location.href = 'page5.html';
    }
</script>

</body>
</html>
