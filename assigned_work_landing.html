<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion - Assigned Work</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F2F3F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #F2F3F7;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 8px;
        }

        .btn-back {
            width: 38px;
            height: 38px;
            background: #fff;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-decoration: none;
            transition: transform 0.15s;
        }
        .btn-back:active { transform: scale(0.93); }
        .btn-back svg { width: 16px; height: 16px; color: #374151; }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ── Hero ── */
        .hero {
            padding: 24px 20px 0;
            animation: fadeUp 0.4s ease both;
        }

        .hero-eyebrow {
            font-size: 12px;
            font-weight: 700;
            color: #F97316;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .hero-eyebrow svg { width: 13px; height: 13px; }

        .hero-title {
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            line-height: 1.15;
            letter-spacing: -0.3px;
        }

        .hero-sub {
            font-size: 14px;
            color: #6B7280;
            margin-top: 6px;
        }



        /* ── Issue category cards ── */
        .cards-list {
            padding: 16px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .issue-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
            animation: fadeUp 0.4s ease both;
        }
        .issue-card:active { transform: scale(0.975); box-shadow: 0 1px 6px rgba(0,0,0,0.06); }

        .issue-card:nth-child(1) { animation-delay: 0.10s; }
        .issue-card:nth-child(2) { animation-delay: 0.15s; }
        .issue-card:nth-child(3) { animation-delay: 0.20s; }
        .issue-card:nth-child(4) { animation-delay: 0.25s; }

        .issue-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .issue-icon svg { width: 22px; height: 22px; }

        .icon-all      { background: #EFF6FF; }
        .icon-all svg  { color: #2563EB; }
        .icon-batt     { background: #FEF2F2; }
        .icon-batt svg { color: #DC2626; }
        .icon-net      { background: #F0FDF4; }
        .icon-net svg  { color: #16A34A; }
        .icon-cam      { background: #FFF7ED; }
        .icon-cam svg  { color: #F97316; }

        .issue-info { flex: 1; }
        .issue-name {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 3px;
        }
        .issue-desc {
            font-size: 12px;
            color: #9CA3AF;
            font-weight: 500;
        }

        .issue-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .issue-count {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            line-height: 1;
        }

        .alert-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #DC2626;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="phone-shell">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="flow_pick.html" class="btn-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </a>
        <div class="avatar">CW</div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <div class="hero-eyebrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
            Maintenance
        </div>
        <div class="hero-title">Assigned Work</div>
        <div class="hero-sub" id="storeSubtitle">Store 0100</div>
    </div>

    <!-- Issue category cards -->
    <div class="cards-list">

        <a href="all_issues_map.html" class="issue-card">
            <div class="issue-icon icon-all">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
            </div>
            <div class="issue-info">
                <div class="issue-name">All Issues</div>
                <div class="issue-desc">Battery · Network · Camera</div>
            </div>
            <div class="issue-right">
                <div class="issue-count">25</div>
                <div class="alert-dot"></div>
            </div>
        </a>

        <a href="batt_issues_map.html" class="issue-card">
            <div class="issue-icon icon-batt">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="6" width="18" height="12" rx="2"/><path d="M23 13v-2"/>
                    <line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/>
                </svg>
            </div>
            <div class="issue-info">
                <div class="issue-name">Battery</div>
                <div class="issue-desc">Dead or low-charge units</div>
            </div>
            <div class="issue-right">
                <div class="issue-count">13</div>
                <div class="alert-dot"></div>
            </div>
        </a>

        <a href="network_issues_map.html" class="issue-card">
            <div class="issue-icon icon-net">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/>
                    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/>
                </svg>
            </div>
            <div class="issue-info">
                <div class="issue-name">Network</div>
                <div class="issue-desc">Offline or weak signal</div>
            </div>
            <div class="issue-right">
                <div class="issue-count">4</div>
                <div class="alert-dot"></div>
            </div>
        </a>

        <a href="camera_issues_map.html" class="issue-card">
            <div class="issue-icon icon-cam">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
                </svg>
            </div>
            <div class="issue-info">
                <div class="issue-name">Camera</div>
                <div class="issue-desc">Blocked, blurry, or offline</div>
            </div>
            <div class="issue-right">
                <div class="issue-count">8</div>
                <div class="alert-dot"></div>
            </div>
        </a>

    </div>

</div>

<script>
    // Show selected store name in subtitle
    const store = sessionStorage.getItem('selectedStore');
    if (store) {
        document.getElementById('storeSubtitle').textContent = 'Store ' + store;
    }
</script>

</body>
</html>
