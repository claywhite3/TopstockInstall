<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion — Maintenance: What's Next?</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #F2F3F7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .shell { width: 100%; max-width: 390px; min-height: 100vh; background: #F2F3F7; display: flex; flex-direction: column; padding-bottom: 40px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 8px; position: relative; }
        .btn-back { width: 38px; height: 38px; background: #fff; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-decoration: none; transition: transform .15s; flex-shrink: 0; }
        .btn-back:active { transform: scale(.93); }
        .btn-back svg { width: 16px; height: 16px; color: #374151; }
        .avatar { width: 40px; height: 40px; background: #2563EB; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; flex-shrink: 0; }
        .rail-header { padding: 4px 20px 0; }
        .rail-id-label { font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .5px; }
        .rail-id { font-size: 28px; font-weight: 800; color: #111827; line-height: 1.1; margin-top: 2px; letter-spacing: .5px; }
        .rail-meta { font-size: 13px; color: #6B7280; font-weight: 500; margin-top: 4px; }

        /* Success hero */
        .success-card { margin: 20px 20px 0; background: #fff; border-radius: 20px; padding: 28px 22px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); animation: fadeUp .35s ease both; }
        .success-icon { width: 64px; height: 64px; background: #F0FDF4; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
        .success-icon svg { width: 32px; height: 32px; color: #16A34A; }
        .success-eyebrow { font-size: 11px; font-weight: 700; color: #16A34A; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
        .success-title { font-size: 22px; font-weight: 800; color: #111827; line-height: 1.25; margin-bottom: 8px; }
        .success-sub { font-size: 14px; color: #6B7280; font-weight: 500; line-height: 1.5; }

        /* Other issues list (if any remain) */
        .remaining-wrap { margin: 16px 20px 0; }
        .remaining-label { font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
        .remaining-card { background: #fff; border-radius: 14px; padding: 14px 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 12px; border-left: 3px solid #F97316; }
        .remaining-dot { width: 10px; height: 10px; border-radius: 50%; background: #F97316; flex-shrink: 0; }
        .remaining-label-text { font-size: 14px; font-weight: 700; color: #111827; flex: 1; }
        .remaining-count { font-size: 11px; font-weight: 600; color: #9CA3AF; }

        /* Decision choice section */
        .choice-wrap { margin: 22px 20px 0; }
        .choice-prompt { font-size: 13px; font-weight: 700; color: #6B7280; text-align: center; margin-bottom: 12px; }
        .choice-row { display: flex; gap: 10px; }
        .choice-btn { flex: 1; padding: 18px 12px; border-radius: 16px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; align-items: center; gap: 6px; text-decoration: none; transition: transform .15s; }
        .choice-btn:active { transform: scale(.97); }
        .choice-btn .cb-title { font-size: 14px; font-weight: 800; line-height: 1.2; }
        .choice-btn .cb-sub   { font-size: 11px; font-weight: 500; line-height: 1.3; opacity: .85; }
        .choice-green  { background: #16A34A; color: #fff; box-shadow: 0 4px 14px rgba(22,163,74,0.3); }
        .choice-orange { background: #F97316; color: #fff; box-shadow: 0 4px 14px rgba(249,115,22,0.3); }
        .choice-disabled { background: #F3F4F6; color: #9CA3AF; pointer-events: none; box-shadow: none; }
        .choice-icon { width: 28px; height: 28px; }

        .btn-row-bottom { padding: 16px 20px 0; }
        .btn-checklist { width: 100%; padding: 14px; background: #fff; color: #6B7280; border: 1.5px solid #E5E7EB; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; transition: transform .15s; }
        .btn-checklist:active { transform: scale(.975); }

        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes spin   { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="shell">
    <div class="top-bar">
        <a href="#" class="btn-back" id="backBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <a href="flow_pick.html" style="position:absolute;left:50%;transform:translateX(-50%);width:38px;height:38px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);text-decoration:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <div class="avatar" id="avatarEl">CW</div>
    </div>

    <div class="rail-header">
        <div style="font-size:10px;font-weight:700;color:#2563EB;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;" id="eyebrowLabel">Maintenance · Camera</div>
        <div class="rail-id-label">Rail ID</div>
        <div class="rail-id" id="hdrRailId">—</div>
        <div class="rail-meta" id="hdrMeta">—</div>
    </div>

    <div class="success-card">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="success-eyebrow" id="fixedLabel">Camera Fix Complete</div>
        <div class="success-title">Fix Applied — What's Next?</div>
        <div class="success-sub" id="successSub">Other issues may still be active on this rail. Choose how to proceed.</div>
    </div>

    <div class="remaining-wrap" id="remainingWrap" style="display:none;">
        <div class="remaining-label">Other detected issues on this rail</div>
        <div id="remainingList"></div>
    </div>

    <div class="choice-wrap">
        <div class="choice-prompt" id="choicePrompt">How would you like to proceed?</div>
        <div class="choice-row">
            <button class="choice-btn choice-green" onclick="runFullRailTest()">
                <svg class="choice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.84"/></svg>
                <div class="cb-title">I Fixed It — Retest</div>
                <div class="cb-sub">Run full rail test now</div>
            </button>
            <button class="choice-btn choice-orange" id="btnContinueTs" onclick="continueTroubleshooting()">
                <svg class="choice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <div class="cb-title">Continue Troubleshooting</div>
                <div class="cb-sub">Next detected issue</div>
            </button>
        </div>
    </div>

    <div class="btn-row-bottom">
        <a href="maintenance.html" class="btn-checklist">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Back to Checklist
        </a>
    </div>
</div>
<script>
    // Priority order for routing "continue troubleshooting"
    const PRIORITY = ['battery','network','camera','led','esl'];
    const ROUTES = {
        battery: 'maint_power.html',
        network: 'maint_network.html',
        camera:  'maint_camera.html',
        led:     'maint_led.html',
        esl:     'maint_esl.html',
    };
    const TYPE_LABELS = {
        battery: 'Battery Issue',
        network: 'Network Issue',
        camera:  'Camera Issue',
        led:     'LED Issue',
        esl:     'E-Label Issue',
    };
    let _rp = '';
    let _issueId = '';
    let _nextType = null;

    function getOtherIssues(issueId, fixedType) {
        // Simulation: check if issueId is a multi-issue rail (from maintenance.html data).
        // A8.14 is hard-coded multi-issue: network + camera. For others, randomly assign other issues for demo.
        if (issueId === 'A8.14') {
            return ['network','camera'].filter(t => t !== fixedType);
        }
        // 40% chance of another random issue for demo
        if (Math.random() < 0.4) {
            const pool = PRIORITY.filter(t => t !== fixedType);
            return [pool[Math.floor(Math.random() * pool.length)]];
        }
        return [];
    }

    function continueTroubleshooting() {
        if (!_nextType) return;
        window.location.href = ROUTES[_nextType] + _rp;
    }

    function runFullRailTest() {
        document.body.insertAdjacentHTML('beforeend', `
            <div id="testOverlay" style="position:fixed;inset:0;background:rgba(255,255,255,0.96);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;">
                <div id="testPhase" style="text-align:center;max-width:340px;">
                    <div style="width:64px;height:64px;border:5px solid #E5E7EB;border-top-color:#2563EB;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;"></div>
                    <div style="font-size:20px;font-weight:800;color:#111827;margin-bottom:8px;">Running Full Rail Test…</div>
                    <div style="font-size:14px;color:#6B7280;font-weight:500;line-height:1.5;">Checking camera, power, network, LED, and E-Label. This takes a few seconds.</div>
                </div>
            </div>`);
        setTimeout(() => {
            const passed = Math.random() > 0.3;
            const phaseEl = document.getElementById('testPhase');
            if (passed) {
                phaseEl.innerHTML = `
                    <div style="width:72px;height:72px;background:#F0FDF4;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="36" height="36"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <div style="font-size:11px;font-weight:700;color:#16A34A;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">All Systems Pass</div>
                    <div style="font-size:22px;font-weight:800;color:#111827;margin-bottom:12px;">Rail Fixed</div>
                    <div style="font-size:14px;color:#6B7280;font-weight:500;line-height:1.6;margin-bottom:24px;">Camera, power, network, LED, and E-Label all check out. Returning to checklist.</div>
                    <button onclick="window.location.href='maintenance.html?resolved=' + encodeURIComponent('${_issueId}')" style="width:100%;padding:16px;background:#16A34A;color:#fff;border:none;border-radius:16px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(22,163,74,0.3);">Back to Checklist</button>`;
            } else {
                phaseEl.innerHTML = `
                    <div style="width:72px;height:72px;background:#FEF2F2;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="36" height="36"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </div>
                    <div style="font-size:11px;font-weight:700;color:#DC2626;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Still Failing</div>
                    <div style="font-size:22px;font-weight:800;color:#111827;margin-bottom:12px;">Test Failed</div>
                    <div style="font-size:14px;color:#6B7280;font-weight:500;line-height:1.6;margin-bottom:24px;">One or more systems still failing. Continue troubleshooting or return to the checklist to try again later.</div>
                    <button onclick="document.getElementById('testOverlay').remove()" style="width:100%;padding:16px;background:#2563EB;color:#fff;border:none;border-radius:16px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;">Continue Troubleshooting</button>
                    <button onclick="window.location.href='maintenance.html'" style="width:100%;padding:14px;background:#fff;color:#6B7280;border:1.5px solid #E5E7EB;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">Back to Checklist</button>`;
            }
        }, 3000);
    }

    (function() {
        const p = new URLSearchParams(window.location.search);
        const aisle = p.get('aisle') || 'C3', section = p.get('section') || '2', rail = p.get('rail') || 'Z001-0123';
        const issueId = p.get('issueId') || (aisle + '.' + section);
        const fixed = p.get('fixed') || 'camera';
        const store = sessionStorage.getItem('storeName') || 'Store 0100';
        const userName = sessionStorage.getItem('userName') || 'CW';
        document.getElementById('avatarEl').textContent  = userName.slice(0,2).toUpperCase();
        document.getElementById('hdrRailId').textContent = rail;
        document.getElementById('hdrMeta').textContent   = store + '  ·  ' + aisle + '-' + section;
        _rp = '?aisle=' + aisle + '&section=' + section + '&rail=' + encodeURIComponent(rail) + '&issueId=' + encodeURIComponent(issueId) + '&return=maintenance';
        _issueId = issueId;

        const fixedTitle = TYPE_LABELS[fixed] ? TYPE_LABELS[fixed].replace(' Issue', '') : 'Camera';
        document.getElementById('eyebrowLabel').textContent = 'Maintenance · ' + fixedTitle;
        document.getElementById('fixedLabel').textContent   = fixedTitle + ' Fix Complete';
        document.getElementById('backBtn').href = ROUTES[fixed] + _rp;

        // Determine remaining issues
        const remaining = getOtherIssues(issueId, fixed);
        const contBtn = document.getElementById('btnContinueTs');
        if (remaining.length > 0) {
            // Pick next by priority order
            _nextType = PRIORITY.find(t => remaining.includes(t));
            document.getElementById('remainingWrap').style.display = 'block';
            document.getElementById('remainingList').innerHTML = remaining.map((t, i) => `
                <div class="remaining-card" style="${i>0?'margin-top:6px;':''}">
                    <div class="remaining-dot"></div>
                    <div class="remaining-label-text">${TYPE_LABELS[t]}</div>
                    ${t === _nextType ? '<div class="remaining-count">Next</div>' : ''}
                </div>`).join('');
            document.getElementById('successSub').textContent = remaining.length + ' other issue' + (remaining.length>1?'s':'') + ' detected on this rail. Choose how to proceed.';
        } else {
            // No other issues — skip the decide UI entirely, fire full rail test immediately
            _nextType = null;
            runFullRailTest();
            return;
        }
    })();
</script>
</body>
</html>
