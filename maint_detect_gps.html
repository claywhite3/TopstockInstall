<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion - Confirm Location</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F2F3F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #F2F3F7;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 8px;
        }

        .btn-back {
            width: 38px;
            height: 38px;
            background: #fff;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-decoration: none;
            transition: transform 0.15s;
        }
        .btn-back:active { transform: scale(0.93); }
        .btn-back svg { width: 16px; height: 16px; color: #374151; }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ── Hero ── */
        .hero {
            padding: 28px 20px 0;
            animation: fadeUp 0.4s ease both;
        }
        .hero-eyebrow {
            font-size: 12px;
            font-weight: 700;
            color: #F97316;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .hero-eyebrow svg { width: 13px; height: 13px; }
        .hero-title {
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            line-height: 1.15;
            letter-spacing: -0.3px;
        }
        .hero-sub {
            font-size: 14px;
            color: #6B7280;
            margin-top: 6px;
        }

        /* ── Location card ── */
        .location-card {
            margin: 24px 20px 0;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            animation: fadeUp 0.4s 0.1s ease both;
        }

        .location-info {
            padding: 20px 20px 16px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .pin-icon {
            width: 40px;
            height: 40px;
            background: #FFF7ED;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .pin-icon svg { width: 20px; height: 20px; color: #F97316; }

        .location-text { flex: 1; }
        .store-name {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 3px;
        }
        .store-address {
            font-size: 13px;
            color: #6B7280;
            line-height: 1.5;
        }

        /* Map thumbnail */
        .map-thumb {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }
        .map-thumb-placeholder {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #e0e7ef, #c7d2e0);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .map-thumb-placeholder svg { width: 40px; height: 40px; color: #94A3B8; }

        /* ── Retry state ── */
        .retry-nudge {
            margin: 14px 20px 0;
            background: #FFF7ED;
            border: 1.5px solid #FED7AA;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 13px;
            color: #92400E;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            animation: fadeUp 0.3s ease both;
        }
        .retry-nudge svg { width: 16px; height: 16px; flex-shrink: 0; color: #F97316; }
        .retry-nudge.visible { display: flex; }
        .retry-nudge { text-decoration: none; }

        /* ── Action buttons ── */
        .action-section {
            padding: 20px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
            animation: fadeUp 0.4s 0.2s ease both;
        }

        .btn-primary {
            width: 100%;
            padding: 17px 20px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
        }
        .btn-primary:active { transform: scale(0.975); box-shadow: 0 2px 6px rgba(37,99,235,0.2); }
        .btn-primary svg { width: 17px; height: 17px; }

        .btn-secondary {
            width: 100%;
            padding: 15px 20px;
            background: #fff;
            color: #374151;
            border: 1.5px solid #E5E7EB;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s;
        }
        .btn-secondary:active { transform: scale(0.975); }
        .btn-secondary svg { width: 16px; height: 16px; }
        .btn-secondary.loading { opacity: 0.6; pointer-events: none; }

        /* ── GPS loading overlay ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding-bottom: 60px;
        }
        .overlay.visible { display: flex; }

        .overlay-card {
            background: #fff;
            border-radius: 24px;
            padding: 32px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 280px;
            animation: scaleUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        .gps-spinner {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #FFF7ED;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .gps-spinner svg { width: 24px; height: 24px; color: #F97316; }
        .gps-spinner::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top: 3px solid #F97316;
            animation: spin 1s linear infinite;
        }

        .overlay-title {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
        }
        .overlay-sub {
            font-size: 13px;
            color: #9CA3AF;
            margin-top: -8px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.88); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="phone-shell">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="maint_location.html" class="btn-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </a>
        <div class="avatar">CW</div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <div class="hero-eyebrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
            GPS Detected
        </div>
        <div class="hero-title">Is this your location?</div>
        <div class="hero-sub">Confirm your store before viewing assigned work.</div>
    </div>

    <!-- Location card -->
    <div class="location-card">
        <div class="location-info">
            <div class="pin-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
            </div>
            <div class="location-text">
                <div class="store-name">Walmart Store #0100</div>
                <div class="store-address">406 S Walton Blvd<br>Bentonville, AR 72712</div>
            </div>
        </div>
        <img src="map-preview.jpg" alt="Map preview" class="map-thumb"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="map-thumb-placeholder" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 20l-5.447-2.724A1 1 0 0 1 3 16.382V5.618a1 1 0 0 1 1.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0 0 21 18.382V7.618a1 1 0 0 0-.553-.894L15 4m0 13V4M9 7l6-3"/></svg>
        </div>
    </div>

    <!-- Retry nudge (shown after first retry) -->
    <a href="maint_location.html" class="retry-nudge" id="retryNudge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Still not right? Try selecting your store manually instead.
    </a>

    <!-- Actions -->
    <div class="action-section">

        <button class="btn-primary" onclick="confirmLocation()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Yes, Confirm Location
        </button>

        <button class="btn-secondary" id="retryBtn" onclick="triggerRetry()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.84"/></svg>
            No, Retry GPS
        </button>

    </div>

</div>

<!-- GPS loading overlay -->
<div class="overlay" id="gpsOverlay">
    <div class="overlay-card">
        <div class="gps-spinner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
            </svg>
        </div>
        <div class="overlay-title">Acquiring GPS Signal</div>
        <div class="overlay-sub">This may take a moment…</div>
    </div>
</div>

<script>
    let retryCount = 0;

    function confirmLocation() {
        sessionStorage.setItem('selectedStore', '0100');
        window.location.href = 'assigned_work_landing.html';
    }

    function triggerRetry() {
        const overlay  = document.getElementById('gpsOverlay');
        const retryBtn = document.getElementById('retryBtn');
        const nudge    = document.getElementById('retryNudge');

        retryBtn.classList.add('loading');
        overlay.classList.add('visible');

        setTimeout(() => {
            overlay.classList.remove('visible');
            retryBtn.classList.remove('loading');
            retryCount++;

            if (retryCount === 1) {
                // First retry — show nudge
                nudge.classList.add('visible');
            } else if (retryCount >= 2) {
                // Second retry — show not-found state
                document.querySelector('.hero-eyebrow').innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    GPS Unavailable
                `;
                document.querySelector('.hero-eyebrow').style.color = '#DC2626';
                document.querySelector('.hero-title').textContent = 'Location Not Found';
                document.querySelector('.hero-sub').textContent = 'GPS could not determine your store. Please select manually.';
                document.querySelector('.location-card').style.opacity = '0.4';
                document.querySelector('.location-card').style.pointerEvents = 'none';
                retryBtn.style.display = 'none';
                nudge.classList.add('visible');
            }
        }, 2500);
    }
</script>

</body>
</html>
