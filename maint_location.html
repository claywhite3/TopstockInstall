<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion - Select Store</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F2F3F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #F2F3F7;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 8px;
        }

        .btn-back {
            width: 38px;
            height: 38px;
            background: #fff;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-decoration: none;
            transition: transform 0.15s;
        }
        .btn-back:active { transform: scale(0.93); }
        .btn-back svg { width: 16px; height: 16px; color: #374151; }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ── Hero ── */
        .hero {
            padding: 28px 20px 0;
            animation: fadeUp 0.4s ease both;
        }
        .hero-eyebrow {
            font-size: 12px;
            font-weight: 700;
            color: #F97316;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .hero-eyebrow svg { width: 13px; height: 13px; }
        .hero-title {
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            line-height: 1.15;
            letter-spacing: -0.3px;
        }
        .hero-sub {
            font-size: 14px;
            color: #6B7280;
            margin-top: 6px;
        }

        /* ── Store select card ── */
        .select-card {
            margin: 24px 20px 0;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            animation: fadeUp 0.4s 0.1s ease both;
        }

        .select-label {
            font-size: 11px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .select-wrapper {
            position: relative;
        }

        .store-select {
            width: 100%;
            padding: 14px 44px 14px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            background: #F8FAFC;
            border: 1.5px solid #E5E7EB;
            border-radius: 14px;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s;
        }
        .store-select:focus { border-color: #2563EB; }

        .select-chevron {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #6B7280;
        }
        .select-chevron svg { width: 16px; height: 16px; }

        /* ── Action buttons ── */
        .action-section {
            padding: 20px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
            animation: fadeUp 0.4s 0.2s ease both;
        }

        /* Primary — view list */
        .btn-primary {
            width: 100%;
            padding: 17px 20px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
        }
        .btn-primary:active { transform: scale(0.975); box-shadow: 0 2px 6px rgba(37,99,235,0.2); }
        .btn-primary svg { width: 17px; height: 17px; }

        /* Secondary — detect location */
        .btn-secondary {
            width: 100%;
            padding: 15px 20px;
            background: #fff;
            color: #374151;
            border: 1.5px solid #E5E7EB;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s;
            text-decoration: none;
        }
        .btn-secondary:active { transform: scale(0.975); }
        .btn-secondary svg { width: 16px; height: 16px; color: #F97316; }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="phone-shell">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="index.html" class="btn-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </a>
        <div class="avatar">CW</div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <div class="hero-eyebrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
            Maintenance
        </div>
        <div class="hero-title">Select Store Location</div>
        <div class="hero-sub">Choose your assigned store to view open work orders.</div>
    </div>

    <!-- Store selector card -->
    <div class="select-card">
        <div class="select-label">Store Number</div>
        <div class="select-wrapper">
            <select class="store-select" id="storeSelect">
                <option value="0042">Store 0042</option>
                <option value="0098">Store 0098</option>
                <option value="0100" selected>Store 0100</option>
                <option value="0450">Store 0450</option>
                <option value="1055">Store 1055</option>
                <option value="2290">Store 2290</option>
                <option value="3301">Store 3301</option>
                <option value="4100">Store 4100</option>
                <option value="8821">Store 8821</option>
            </select>
            <div class="select-chevron">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 9l6 6 6-6"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="action-section">

        <button class="btn-primary" onclick="goToWork()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            View Assigned Work
        </button>

        <a href="maint_detect_gps.html" class="btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 2"/></svg>
            Detect My Location via GPS
        </a>

    </div>

</div>

<script>
    function goToWork() {
        const store = document.getElementById('storeSelect').value;
        sessionStorage.setItem('selectedStore', store);
        window.location.href = 'assigned_work_landing.html';
    }
</script>

</body>
</html>
