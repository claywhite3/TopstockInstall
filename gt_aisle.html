<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion - Select Aisle</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #F2F3F7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .shell { width: 100%; max-width: 390px; min-height: 100vh; background: #F2F3F7; display: flex; flex-direction: column; padding-bottom: 32px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 8px; }
        .btn-back { width: 38px; height: 38px; background: #fff; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-decoration: none; transition: transform .15s; }
        .btn-back:active { transform: scale(.93); }
        .btn-back svg { width: 16px; height: 16px; color: #374151; }
        .avatar { width: 40px; height: 40px; background: #2563EB; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; }

        .hero { padding: 4px 20px 0; }
        .eyebrow { font-size: 11px; font-weight: 700; color: #2563EB; text-transform: uppercase; letter-spacing: .5px; }
        .hero-title { font-size: 22px; font-weight: 800; color: #111827; margin-top: 2px; }
        .hero-sub { font-size: 13px; color: #6B7280; font-weight: 500; margin-top: 1px; }

        /* Summary strip */
        .summary-strip { margin: 14px 20px 0; display: flex; gap: 8px; }
        .summary-pill { flex: 1; background: #fff; border-radius: 12px; padding: 10px 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .pill-count { font-size: 20px; font-weight: 800; line-height: 1; }
        .pill-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
        .pill-urgent .pill-count { color: #DC2626; } .pill-urgent .pill-label { color: #DC2626; }
        .pill-pull   .pill-count { color: #D97706; } .pill-pull   .pill-label { color: #D97706; }
        .pill-clear  .pill-count { color: #9CA3AF; } .pill-clear  .pill-label { color: #9CA3AF; }

        /* Sort toggle */
        .sort-bar { margin: 14px 20px 0; background: #E5E7EB; border-radius: 12px; padding: 3px; display: flex; }
        .sort-btn { flex: 1; padding: 8px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .18s; background: transparent; color: #6B7280; }
        .sort-btn.active { background: #fff; color: #111827; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

        .section-header { font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .5px; padding: 16px 20px 8px; }

        /* 2x2 grid */
        .aisle-grid { padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* Card base */
        .aisle-card { border-radius: 18px; padding: 14px; text-decoration: none; display: flex; flex-direction: column; gap: 4px; position: relative; overflow: hidden; transition: transform .15s, box-shadow .15s; animation: fadeUp .3s ease both; opacity: 0; }
        .aisle-card:active { transform: scale(.97); }
        .aisle-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 18px 18px 0 0; }

        /* Urgent — red */
        .ac-urgent { background: #fff; box-shadow: 0 2px 12px rgba(220,38,38,0.12); border: 1.5px solid #FECACA; }
        .ac-urgent::before { background: #DC2626; }
        .ac-urgent .ac-label { color: #DC2626; }
        .ac-urgent .ac-status { color: #DC2626; background: #FEF2F2; }
        .ac-urgent .ac-count  { color: #DC2626; }
        .ac-urgent .ac-arrow svg { color: #FCA5A5; }

        /* Pull — orange */
        .ac-pull { background: #fff; box-shadow: 0 2px 12px rgba(217,119,6,0.10); border: 1.5px solid #FDE68A; }
        .ac-pull::before { background: #D97706; }
        .ac-pull .ac-label  { color: #D97706; }
        .ac-pull .ac-status { color: #D97706; background: #FFFBEB; }
        .ac-pull .ac-count  { color: #D97706; }
        .ac-pull .ac-arrow svg { color: #FCD34D; }

        /* Clear — muted */
        .ac-clear { background: #F9FAFB; box-shadow: none; border: 1.5px solid #E5E7EB; opacity: 0.6; }
        .ac-clear::before { background: #D1D5DB; }
        .ac-clear .ac-label  { color: #9CA3AF; }
        .ac-clear .ac-name   { color: #9CA3AF; }
        .ac-clear .ac-status { color: #9CA3AF; background: #F3F4F6; }
        .ac-clear .ac-arrow svg { color: #D1D5DB; }

        .ac-label  { font-size: 18px; font-weight: 800; letter-spacing: .3px; margin-top: 2px; }
        .ac-name   { font-size: 12px; font-weight: 700; color: #374151; line-height: 1.2; margin-top: 1px; }
        .ac-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; width: fit-content; margin-top: 4px; }
        .ac-count  { font-size: 11px; font-weight: 600; margin-top: 2px; }
        .ac-items  { display: flex; flex-direction: column; gap: 1px; margin-top: 4px; }
        .ac-item   { font-size: 10px; color: #9CA3AF; font-weight: 500; line-height: 1.3; }
        .ac-clear .ac-item { color: #C4C9D4; }
        .ac-arrow  { position: absolute; top: 14px; right: 12px; }
        .ac-arrow svg { width: 13px; height: 13px; }

        @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="shell">

    <div class="top-bar">
        <a href="gt_zone.html" class="btn-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <div class="avatar">CW</div>
    </div>

    <div class="hero">
        <div class="eyebrow">Guided Topstock</div>
        <div class="hero-title" id="hdrZone">Zone A</div>
        <div class="hero-sub" id="hdrSub">Grocery · 12 aisles</div>
    </div>

    <div class="summary-strip">
        <div class="summary-pill pill-urgent">
            <div class="pill-count" id="countUrgent">0</div>
            <div class="pill-label">Urgent</div>
        </div>
        <div class="summary-pill pill-pull">
            <div class="pill-count" id="countPull">0</div>
            <div class="pill-label">Items to Pull</div>
        </div>
        <div class="summary-pill pill-clear">
            <div class="pill-count" id="countClear">0</div>
            <div class="pill-label">All Clear</div>
        </div>
    </div>

    <div class="sort-bar">
        <button class="sort-btn active" id="btnPriority" onclick="setSort('priority')">Priority</button>
        <button class="sort-btn" id="btnNumber"   onclick="setSort('number')">Number Order</button>
    </div>

    <div class="section-header">Aisles — tap to open</div>
    <div class="aisle-grid" id="aisleGrid"></div>

</div>

<script>
    // Real aisle descriptors from Store 0100 in-store signage — Zone A
    const AISLE_META = {
        "A8":  { name: "Canned Goods",   items: ["Soup","Canned Meat","Canned Beans","Canned Vegetables"] },
        "A9":  { name: "Canned Goods",   items: ["Soup","Canned Meat","Canned Beans","Canned Vegetables"] },
        "A10": { name: "International",  items: ["Tortillas","Rice & Beans","Canned Fruit","International Foods"] },
        "A11": { name: "International",  items: ["Tortillas","Rice & Beans","Canned Fruit","International Foods"] },
        "A12": { name: "Pasta & Dinner", items: ["Pasta","Stuffing","Box Dinners","Canned Tomatoes"] },
        "A13": { name: "Pasta & Dinner", items: ["Pasta","Stuffing","Box Dinners","Canned Tomatoes"] },
        "A14": { name: "Baking",         items: ["Baking","Spices","Gelatin","Vinegar"] },
        "A15": { name: "Baking",         items: ["Baking","Spices","Gelatin","Vinegar"] },
        "A16": { name: "Breakfast",      items: ["Cereal","Granola","Hot Cereal","Syrup & Pancake Mix"] },
        "A17": { name: "Breakfast",      items: ["Cereal","Granola","Hot Cereal","Syrup & Pancake Mix"] },
        "A18": { name: "Bread & Coffee", items: ["Bread","Coffee","Snack Cakes","Peanut Butter"] },
        "A19": { name: "Bread & Coffee", items: ["Bread","Coffee","Snack Cakes","Peanut Butter"] },
    };

    // Priority data for Zone A demo
    const AISLE_PRIORITY = {
        "A8":"clear","A9":"clear","A10":"clear","A11":"clear",
        "A12":"clear","A13":"urgent",
        "A14":"clear","A15":"clear","A16":"pull","A17":"clear","A18":"clear","A19":"pull"
    };
    const AISLE_SECTION_ISSUES = {
        "A13": 4,  // sections with urgent issues
        "A16": 2,  // sections with pull items
        "A19": 2,  // sections with pull items
    };

    const SECTION_COUNTS = {"A8":16,"A9":16,"A10":16,"A11":16,"A12":16,"A13":16,"A14":16,"A15":16,"A16":16,"A17":16,"A18":16,"A19":16,"E2":7,"E3":8,"E4":6,"E5":8,"F18":10,"F19":10,"F20":10,"F21":10,"F22":8,"F23":4,"F24":5,"F25":7,"F26":10,"F27":3,"F28":8,"F29":10,"F30":9,"F31":9,"F32":9,"F33":7,"F34":10,"F35":10,"G2":4,"G3":4,"G6":3,"G7":6,"G8":9,"G9":9,"G10":9,"G11":6,"G12":9,"G13":9,"G14":9,"G15":9,"G16":9,"G17":9,"G18":5,"G19":5,"G20":3,"G21":3,"G22":5,"G23":5,"G24":5,"G25":5,"G26":5,"G27":5,"G30":3,"H4":5,"H5":5,"H6":5,"H7":5,"H10":5,"H11":5,"H12":5,"H13":5,"H14":6,"H15":4,"H18":16,"H19":16,"H20":16,"H21":16,"H22":14,"H23":16,"H24":16,"H25":15,"H26":15,"H27":16,"H32":9,"H33":8,"H38":4,"H39":4,"H40":5,"H41":5,"H44":5,"H45":5,"H48":3,"H49":5,"I2":11,"I3":11,"I4":11,"I5":7,"I6":11,"I7":11,"I8":11,"I9":11,"I14":8,"I15":8,"I16":5,"I17":5,"I18":7,"I19":7,"I22":4,"I23":5,"I24":2,"I25":2,"I26":4,"I27":4,"I28":4,"I29":4,"J2":9,"J3":9,"J4":4,"J5":4,"J8":9,"J9":9,"J12":10,"J13":10,"J14":7,"J15":7,"J16":10,"J17":10,"J20":10,"J21":10,"J22":8,"J23":10,"L1":8,"L2":6,"L3":6,"L4":7,"L5":9,"L6":9,"L7":11,"L8":11,"L9":11,"L10":11,"L11":3,"L12":3,"L13":2,"L14":2,"L15":10,"L16":11,"L17":7,"L18":8};

    const AISLES_BY_ZONE = {"A":["A8","A9","A10","A11","A12","A13","A14","A15","A16","A17","A18","A19"],"E":["E2","E3","E4","E5"],"F":["F18","F19","F20","F21","F22","F23","F24","F25","F26","F27","F28","F29","F30","F31","F32","F33","F34","F35"],"G":["G2","G3","G6","G7","G8","G9","G10","G11","G12","G13","G14","G15","G16","G17","G18","G19","G20","G21","G22","G23","G24","G25","G26","G27","G30"],"H":["H4","H5","H6","H7","H10","H11","H12","H13","H14","H15","H18","H19","H20","H21","H22","H23","H24","H25","H26","H27","H32","H33","H38","H39","H40","H41","H44","H45","H48","H49"],"I":["I2","I3","I4","I5","I6","I7","I8","I9","I14","I15","I16","I17","I18","I19","I22","I23","I24","I25","I26","I27","I28","I29"],"J":["J2","J3","J4","J5","J8","J9","J12","J13","J14","J15","J16","J17","J20","J21","J22","J23"],"L":["L1","L2","L3","L4","L5","L6","L7","L8","L9","L10","L11","L12","L13","L14","L15","L16","L17","L18"]};

    const ZONE_NAMES = { A:"Grocery", E:"Baby", F:"Stationery & Office", G:"Health & Beauty", H:"Home Goods", I:"Toys & Entertainment", J:"Paper & Chemicals", L:"Tools & Hardware" };

    const p = new URLSearchParams(window.location.search);
    const zone = (p.get('zone') || 'A').toUpperCase();
    const aisles = AISLES_BY_ZONE[zone] || [];

    document.getElementById('hdrZone').textContent = 'Zone ' + zone;
    document.getElementById('hdrSub').textContent = (ZONE_NAMES[zone] || 'Zone ' + zone) + ' · ' + aisles.length + ' aisles';

    // Build aisle data with priority
    function getAislePriority(aisle) {
        // Use explicit priority for Zone A demo; derive for others
        if (AISLE_PRIORITY[aisle]) return AISLE_PRIORITY[aisle];
        const seed = (aisle.charCodeAt(0) * 17 + parseInt(aisle.slice(1)||0) * 13) % 100;
        return seed < 15 ? 'urgent' : seed < 35 ? 'pull' : 'clear';
    }

    const allAisles = aisles.map(a => ({ aisle: a, priority: getAislePriority(a), issues: AISLE_SECTION_ISSUES[a] || 0 }));

    // Summary counts
    const urgentCount = allAisles.filter(a => a.priority === 'urgent').length;
    const pullCount   = allAisles.filter(a => a.priority === 'pull').length;
    const clearCount  = allAisles.filter(a => a.priority === 'clear').length;
    document.getElementById('countUrgent').textContent = urgentCount;
    document.getElementById('countPull').textContent   = pullCount;
    document.getElementById('countClear').textContent  = clearCount;

    let currentSort = 'priority';

    function setSort(mode) {
        currentSort = mode;
        document.getElementById('btnPriority').classList.toggle('active', mode === 'priority');
        document.getElementById('btnNumber').classList.toggle('active', mode === 'number');
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('aisleGrid');
        grid.innerHTML = '';

        let ordered = [...allAisles];
        if (currentSort === 'priority') {
            const order = { urgent: 0, pull: 1, clear: 2 };
            ordered.sort((a, b) => order[a.priority] - order[b.priority]);
        }

        const statusMeta = {
            urgent: { cls: 'ac-urgent', label: 'Urgent',        icon: true },
            pull:   { cls: 'ac-pull',   label: 'Items to Pull', icon: false },
            clear:  { cls: 'ac-clear',  label: 'All Clear',     icon: false },
        };

        ordered.forEach((d, i) => {
            const meta  = statusMeta[d.priority];
            const aMeta = AISLE_META[d.aisle];
            const delay = Math.min(i * 0.04, 0.4).toFixed(2);

            const card = document.createElement('a');
            card.href  = `gt_section.html?aisle=${d.aisle}`;
            card.className = `aisle-card ${meta.cls}`;
            card.style.animationDelay = `${delay}s`;

            const itemsHtml = aMeta
                ? aMeta.items.map(it => `<div class="ac-item">${it}</div>`).join('')
                : '';

            const issueText = d.issues > 0
                ? `<div class="ac-count">${d.issues} section${d.issues !== 1 ? 's' : ''} need attention</div>`
                : '';

            card.innerHTML = `
                <div class="ac-label">${d.aisle}</div>
                ${aMeta ? `<div class="ac-name">${aMeta.name}</div>` : ''}
                <div class="ac-status">
                    ${meta.icon ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' : ''}
                    ${meta.label}
                </div>
                ${issueText}
                ${aMeta ? `<div class="ac-items">${itemsHtml}</div>` : ''}
                <div class="ac-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div>
            `;
            grid.appendChild(card);
        });
    }

    renderGrid();
</script>
</body>
</html>
