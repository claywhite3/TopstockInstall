<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion TopStock — Select Store</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #F2F3F7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .shell { width: 100%; max-width: 390px; min-height: 100vh; background: #F2F3F7; display: flex; flex-direction: column; padding-bottom: 90px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 8px; }
        .avatar { width: 40px; height: 40px; background: #2563EB; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; }

        .hero { padding: 28px 20px 0; animation: fadeUp .4s ease both; }
        .eyebrow { font-size: 11px; font-weight: 700; color: #2563EB; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
        .hero-title { font-size: 26px; font-weight: 800; color: #111827; line-height: 1.15; }
        .hero-sub { font-size: 14px; color: #6B7280; font-weight: 500; margin-top: 6px; line-height: 1.5; }

        .search-card { margin: 24px 20px 0; background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); animation: fadeUp .4s .08s ease both; opacity: 0; }
        .field-label { font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .4px; }

        .search-wrap { position: relative; margin-bottom: 14px; }
        .search-input { width: 100%; padding: 13px 16px 13px 42px; background: #F9FAFB; border: 1.5px solid #E5E7EB; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; color: #111827; outline: none; transition: border-color .2s; }
        .search-input:focus { border-color: #2563EB; background: #fff; }
        .search-input::placeholder { color: #9CA3AF; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; }
        .search-icon svg { width: 16px; height: 16px; color: #9CA3AF; }

        .btn-findme { width: 100%; padding: 11px 14px; background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; color: #2563EB; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: transform .15s, background .15s; margin-bottom: 14px; }
        .btn-findme:active { transform: scale(.975); background: #DBEAFE; }
        .btn-findme svg { width: 15px; height: 15px; }
        .btn-findme.locating { color: #9CA3AF; border-color: #E5E7EB; background: #F9FAFB; pointer-events: none; }

        .store-list { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
        .store-list::-webkit-scrollbar { width: 0; }
        .store-row { display: flex; align-items: center; gap: 12px; padding: 13px 14px; background: #F9FAFB; border: 1.5px solid #E5E7EB; border-radius: 14px; cursor: pointer; transition: border-color .18s, background .18s; }
        .store-row:hover, .store-row.selected { background: #EFF6FF; border-color: #2563EB; }
        .store-icon { width: 36px; height: 36px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); flex-shrink: 0; }
        .store-icon svg { width: 18px; height: 18px; color: #6B7280; }
        .store-row.selected .store-icon svg { color: #2563EB; }
        .store-info { flex: 1; }
        .store-name { font-size: 14px; font-weight: 700; color: #111827; }
        .store-addr { font-size: 12px; color: #9CA3AF; font-weight: 500; margin-top: 1px; line-height: 1.4; }
        .store-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #E5E7EB; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .18s, border-color .18s; }
        .store-row.selected .store-check { background: #2563EB; border-color: #2563EB; }
        .store-check svg { width: 11px; height: 11px; color: #fff; opacity: 0; transition: opacity .15s; }
        .store-row.selected .store-check svg { opacity: 1; }

        .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 390px; background: #fff; padding: 14px 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.07); border-top: 1px solid #F3F4F6; }
        .btn-primary { width: 100%; padding: 16px; background: #2563EB; color: #fff; border: none; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 14px rgba(37,99,235,0.3); transition: transform .15s, opacity .15s; text-decoration: none; }
        .btn-primary:active { transform: scale(.975); }
        .btn-primary.disabled { opacity: .45; cursor: not-allowed; pointer-events: none; }

        @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="shell">

    <div class="top-bar">
        <div style="width:38px;"></div>
        <div class="avatar" id="avatarEl">CW</div>
    </div>

    <div class="hero">
        <div class="eyebrow">Vusion TopStock</div>
        <div class="hero-title">Select a Store</div>
        <div class="hero-sub">Choose your location to get started.</div>
    </div>

    <div class="search-card">
        <div class="field-label">Store</div>
        <div class="search-wrap">
            <div class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
            <input class="search-input" id="searchInput" type="text" placeholder="Search store number or city…" oninput="filterStores(this.value)" autocomplete="off">
        </div>
        <button class="btn-findme" id="findMeBtn" onclick="findMe()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            Use My Location
        </button>
        <div class="store-list" id="storeList"></div>
    </div>

</div>

<div class="bottom-bar">
    <button class="btn-primary disabled" id="ctaBtn" onclick="proceed()">
        Continue
    </button>
</div>

<script>
    const STORES = [
        { id:'0100', name:'Store 0100', addr:'406 S Walton Blvd\nBentonville, AR 72712' },
        { id:'1216', name:'Store 1216', addr:'1213 E Trinity Mills Rd\nCarrollton, TX 75006' },
        { id:'4686', name:'Store 4686', addr:'906 SW Regional Airport Blvd\nBentonville, AR 72712' },
        { id:'7634', name:'Store 7634', addr:'13739 N Central Expressway\nDallas, TX 75243' },
    ];

    let selectedId = null;

    // Show initials from login
    const userName = sessionStorage.getItem('userName') || '';
    if (userName) {
        const initials = userName.slice(0,2).toUpperCase();
        document.getElementById('avatarEl').textContent = initials;
    }

    const STORE_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
    const CHECK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

    function renderStores(list) {
        const el = document.getElementById('storeList');
        if (list.length === 0) {
            el.innerHTML = `<div style="text-align:center;padding:20px 0;color:#9CA3AF;font-size:13px;font-weight:600;">No stores found</div>`;
            return;
        }
        el.innerHTML = list.map(s => {
            const addrHtml = s.addr.split('\n').join('<br>');
            return `<div class="store-row${selectedId === s.id ? ' selected' : ''}" onclick="selectStore('${s.id}')">
                <div class="store-icon">${STORE_ICON}</div>
                <div class="store-info">
                    <div class="store-name">${s.name}</div>
                    <div class="store-addr">${addrHtml}</div>
                </div>
                <div class="store-check">${CHECK_ICON}</div>
            </div>`;
        }).join('');
    }

    function filterStores(q) {
        const filtered = STORES.filter(s =>
            s.id.includes(q) || s.name.toLowerCase().includes(q.toLowerCase()) || s.addr.toLowerCase().includes(q.toLowerCase())
        );
        renderStores(filtered);
    }

    function selectStore(id) {
        selectedId = id;
        const store = STORES.find(s => s.id === id);
        // Write universal keys
        sessionStorage.setItem('storeId',   id);
        sessionStorage.setItem('storeName', store ? store.name : 'Store ' + id);
        sessionStorage.setItem('storeAddr', store ? store.addr.replace('\n', ', ') : '');
        document.getElementById('ctaBtn').classList.remove('disabled');
        filterStores(document.getElementById('searchInput').value);
    }

    function proceed() {
        window.location.href = 'flow_pick.html';
    }

    function findMe() {
        const btn = document.getElementById('findMeBtn');
        btn.classList.add('locating');
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Locating…`;
        setTimeout(() => {
            btn.classList.remove('locating');
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg> Use My Location`;
            selectStore('0100');
            setTimeout(() => {
                const el = document.querySelector('.store-row.selected');
                if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
            }, 100);
        }, 1800);
    }

    // Restore prior selection if coming back
    const saved = sessionStorage.getItem('storeId');
    if (saved) selectedId = saved;
    renderStores(STORES);
    if (saved) document.getElementById('ctaBtn').classList.remove('disabled');
</script>
</body>
</html>
