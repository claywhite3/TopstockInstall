<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion - Select Modular</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F2F3F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #F2F3F7;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 8px;
        }

        .back-btn {
            width: 38px;
            height: 38px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .back-btn svg { width: 18px; height: 18px; color: #111827; }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ── Hero ── */
        .hero {
            padding: 16px 20px 0;
            animation: fadeUp 0.4s ease both;
        }
        .hero-title { font-size: 24px; font-weight: 700; color: #111827; line-height: 1.2; }
        .hero-sub { font-size: 14px; color: #6B7280; margin-top: 4px; line-height: 1.5; }

        /* ── Image card ── */
        .image-card {
            margin: 18px 20px 0;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            animation: fadeUp 0.4s 0.1s ease both;
        }

        .instruction-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-caption {
            padding: 10px 16px 12px;
            font-size: 12px;
            color: #9CA3AF;
            font-weight: 500;
            text-align: center;
        }

        .image-placeholder {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #e0e7ef, #c7d2e0);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .image-placeholder svg { width: 36px; height: 36px; color: #94A3B8; }
        .image-placeholder span { font-size: 12px; color: #94A3B8; font-weight: 500; }

        /* ── Selector section ── */
        .selector-section {
            padding: 18px 20px 0;
            animation: fadeUp 0.4s 0.15s ease both;
        }

        .selector-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .selector-label {
            font-size: 11px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-left: 4px;
        }

        /* ── Combobox ── */
        .combobox { position: relative; }

        .combobox-input-wrap {
            background: #fff;
            border: 1.5px solid #E5E7EB;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: border-color 0.15s, box-shadow 0.15s;
            cursor: text;
        }

        .combobox-input-wrap.open,
        .combobox-input-wrap:focus-within {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .combobox-input-wrap.error {
            border-color: #EF4444;
            box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
        }

        .combobox-input {
            flex: 1;
            border: none;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            background: transparent;
            padding: 13px 0;
            width: 100%;
            text-align: center;
        }

        .combobox-input::placeholder { color: #9CA3AF; font-weight: 400; }

        .combobox-chevron {
            width: 18px;
            height: 18px;
            color: #9CA3AF;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .combobox-chevron.rotated { transform: rotate(180deg); }

        /* ── Dropdown list ── */
        .combobox-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #fff;
            border: 1.5px solid #E5E7EB;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            scroll-behavior: smooth;
        }
        .combobox-dropdown.open { display: block; }

        .combobox-option {
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 500;
            color: #111827;
            cursor: pointer;
            transition: background 0.1s;
            text-align: center;
        }
        .combobox-option:first-child { border-radius: 13px 13px 0 0; }
        .combobox-option:last-child  { border-radius: 0 0 13px 13px; }
        .combobox-option:hover,
        .combobox-option.highlighted { background: #EFF6FF; color: #2563EB; }
        .combobox-option.selected    { background: #2563EB; color: #fff; }
        .combobox-option.selected:hover { background: #1D4ED8; }

        .combobox-no-results {
            padding: 14px 16px;
            font-size: 14px;
            color: #9CA3AF;
            text-align: center;
        }

        .combobox-dropdown::-webkit-scrollbar { width: 4px; }
        .combobox-dropdown::-webkit-scrollbar-track { background: transparent; }
        .combobox-dropdown::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }

        /* ── Selected badge ── */
        .selected-badge {
            margin-top: 16px;
            background: #EFF6FF;
            border: 1.5px solid #BFDBFE;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.25s, transform 0.25s;
        }
        .selected-badge.visible { opacity: 1; transform: translateY(0); }
        .badge-label { font-size: 11px; color: #93C5FD; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-value { font-size: 22px; font-weight: 700; color: #2563EB; letter-spacing: 2px; }

        /* ── Error message ── */
        .error-msg {
            margin-top: 10px;
            font-size: 13px;
            color: #EF4444;
            font-weight: 500;
            text-align: center;
            min-height: 20px;
        }

        /* ── Nav buttons ── */
        .nav-area {
            padding: 20px 20px 32px;
            display: flex;
            gap: 12px;
            animation: fadeUp 0.4s 0.25s ease both;
            margin-top: auto;
        }

        .btn-back {
            padding: 15px 20px;
            background: #fff;
            color: #6B7280;
            border: 1.5px solid #E5E7EB;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: transform 0.15s;
            flex-shrink: 0;
        }
        .btn-back:active { transform: scale(0.975); }
        .btn-back svg { width: 16px; height: 16px; }

        .btn-next {
            flex: 1;
            padding: 15px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
        }
        .btn-next:active { transform: scale(0.975); box-shadow: 0 2px 6px rgba(37,99,235,0.2); }
        .btn-next:disabled { background: #CBD5E1; box-shadow: none; cursor: not-allowed; }
        .btn-next svg { width: 18px; height: 18px; }

        /* ── Animations ── */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="phone-shell">

    <!-- Top bar -->
    <div class="top-bar">
        <a href="page3.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <div class="avatar">CW</div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <div class="hero-title">Modular Section</div>
        <div class="hero-sub">Select the modular section where you are currently installing the rail.</div>
    </div>

    <!-- Image Card -->
    <div class="image-card">
        <img src="modular.jpg" alt="Modular Diagram" class="instruction-img"
             onerror="this.parentElement.innerHTML='<div class=\'image-placeholder\'><svg viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'1.5\'><rect x=\'3\' y=\'3\' width=\'18\' height=\'18\' rx=\'2\'/><path d=\'M3 9h18M3 15h18M9 3v18\'/></svg><span>Modular diagram</span></div><div class=\'image-caption\'>Note: Each section requires its own rail</div>'">
        <div class="image-caption">Note: Each section requires its own rail</div>
    </div>

    <!-- Selector Section -->
    <div class="selector-section">
        <div class="selector-group">
            <div class="selector-label">Section Number</div>
            <div class="combobox" id="modularCombobox">
                <div class="combobox-input-wrap" id="modularInputWrap">
                    <input class="combobox-input" id="modularInput" type="text"
                           placeholder="1 – 30"
                           autocomplete="off"
                           maxlength="2">
                    <svg class="combobox-chevron" id="modularChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 9l6 6 6-6"/>
                    </svg>
                </div>
                <div class="combobox-dropdown" id="modularDropdown"></div>
            </div>
        </div>

        <!-- Selected badge -->
        <div class="selected-badge" id="selectedBadge">
            <div class="badge-label">Selected Section</div>
            <div class="badge-value" id="badgeValue">—</div>
        </div>

        <!-- Error message -->
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Nav Buttons -->
    <div class="nav-area">
        <a href="page3.html" class="btn-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            Back
        </a>
        <button class="btn-next" onclick="validateAndGo()">
            Next
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>

</div>

<script>
    const NUMBERS = Array.from({length: 30}, (_, i) => String(i + 1));

    let selectedNumber = '';

    function buildCombobox({ inputId, wrapperId, chevronId, dropdownId, options, onSelect, transform }) {
        const input    = document.getElementById(inputId);
        const wrap     = document.getElementById(wrapperId);
        const chevron  = document.getElementById(chevronId);
        const dropdown = document.getElementById(dropdownId);

        function renderOptions(filter) {
            const q = filter.trim();
            const matches = options.filter(o => o.startsWith(q));
            dropdown.innerHTML = '';

            if (matches.length === 0) {
                dropdown.innerHTML = '<div class="combobox-no-results">No matches</div>';
                return;
            }

            matches.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'combobox-option' + (opt === onSelect._current ? ' selected' : '');
                div.textContent = opt;
                div.addEventListener('mousedown', e => {
                    e.preventDefault();
                    selectOption(opt);
                });
                dropdown.appendChild(div);
            });
        }

        function openDropdown() {
            renderOptions(input.value);
            dropdown.classList.add('open');
            wrap.classList.add('open');
            chevron.classList.add('rotated');
        }

        function closeDropdown() {
            dropdown.classList.remove('open');
            wrap.classList.remove('open');
            chevron.classList.remove('rotated');
        }

        function selectOption(opt) {
            onSelect._current = opt;
            input.value = opt;
            onSelect(opt);
            closeDropdown();
            wrap.classList.remove('error');
            updateBadge();
        }

        input.addEventListener('focus', () => openDropdown());
        input.addEventListener('blur',  () => setTimeout(closeDropdown, 150));

        input.addEventListener('input', () => {
            const val = transform ? transform(input.value) : input.value;
            input.value = val;
            onSelect._current = '';
            onSelect('');
            renderOptions(val);
            if (!dropdown.classList.contains('open')) openDropdown();
            updateBadge();
        });

        wrap.addEventListener('click', () => {
            if (dropdown.classList.contains('open')) {
                closeDropdown();
            } else {
                input.focus();
                openDropdown();
            }
        });
    }

    function setNumber(val) { selectedNumber = val; }
    setNumber._current = '';

    buildCombobox({
        inputId:    'modularInput',
        wrapperId:  'modularInputWrap',
        chevronId:  'modularChevron',
        dropdownId: 'modularDropdown',
        options:    NUMBERS,
        onSelect:   setNumber,
        transform:  v => v.replace(/[^0-9]/g, '').slice(0, 2)
    });

    function updateBadge() {
        const badge = document.getElementById('selectedBadge');
        const value = document.getElementById('badgeValue');
        if (selectedNumber) {
            value.textContent = selectedNumber;
            badge.classList.add('visible');
        } else {
            badge.classList.remove('visible');
        }
        document.getElementById('errorMsg').textContent = '';
    }

    function validateAndGo() {
        const wrap     = document.getElementById('modularInputWrap');
        const errorMsg = document.getElementById('errorMsg');

        if (!selectedNumber) {
            wrap.classList.add('error');
            errorMsg.textContent = 'Please select a valid section number.';
            return;
        }

        wrap.classList.remove('error');

        // Save section context for use on the success page
        sessionStorage.setItem('selectedSection', selectedNumber);

        window.location.href = 'page5.html';
    }
</script>

</body>
</html>
