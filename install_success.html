<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vusion - Success</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F2F3F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #F2F3F7;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 8px;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        /* Top bar right group — aisle chip + avatar */
        .top-bar-right { display: flex; align-items: center; gap: 8px; }
        .aisle-chip { background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 10px; padding: 6px 10px; font-size: 14px; font-weight: 800; color: #2563EB; letter-spacing: 0.3px; line-height: 1; min-height: 28px; display: flex; align-items: center; }
        /* Invisible left spacer to keep home button centered (no back btn on this page) */
        .top-bar-spacer { width: 38px; height: 38px; flex-shrink: 0; }

        .skip-link { display: none; }

        .flag-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
        .flag-overlay.open { opacity: 1; pointer-events: all; }
        .flag-sheet { background: #fff; border-radius: 24px 24px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 390px; transform: translateY(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); }
        .flag-overlay.open .flag-sheet { transform: translateY(0); }
        .flag-icon-wrap { width: 48px; height: 48px; background: #FFFBEB; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; font-size: 22px; }
        .flag-title { font-size: 18px; font-weight: 800; color: #111827; }
        .flag-body  { font-size: 14px; color: #6B7280; margin-top: 6px; line-height: 1.6; }
        .flag-field-label { font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .5px; margin-top: 16px; margin-bottom: 6px; }
        .flag-input { width: 100%; background: #F9FAFB; border: 1.5px solid #E5E7EB; border-radius: 12px; padding: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #111827; outline: none; transition: border-color .15s; resize: none; }
        .flag-input:focus { border-color: #D97706; box-shadow: 0 0 0 3px rgba(217,119,6,0.1); }
        .flag-btns { display: flex; gap: 10px; margin-top: 16px; }
        .flag-cancel { flex: 1; padding: 14px; background: #F3F4F6; color: #374151; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
        .flag-submit { flex: 2; padding: 14px; background: #D97706; color: #fff; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(217,119,6,0.3); }

        /* ── Success graphic ── */
        .success-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 0;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .check-ring {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: #F0FDF4;
            border: 4px solid #16A34A;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 10px rgba(22,163,74,0.08), 0 8px 24px rgba(22,163,74,0.16);
            margin-bottom: 14px;
        }

        .check-ring svg {
            width: 40px;
            height: 40px;
            color: #16A34A;
        }

        .success-title {
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .success-badge {
            margin-top: 8px;
            background: #DCFCE7;
            border: 1.5px solid #86EFAC;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 13px;
            font-weight: 700;
            color: #16A34A;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .success-badge svg { width: 13px; height: 13px; }

        @keyframes popIn {
            0%   { opacity: 0; transform: scale(0.6); }
            70%  { transform: scale(1.04); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ── Rail info card ── */
        .rail-card {
            margin: 18px 20px 0;
            background: #fff;
            border-radius: 18px;
            padding: 14px 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            animation: fadeUp 0.4s 0.2s ease both;
        }

        .rail-card-label {
            font-size: 10px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .rail-meta-row {
            display: flex;
            gap: 10px;
        }

        .rail-meta-chip {
            flex: 1;
            background: #F8FAFC;
            border: 1.5px solid #E5E7EB;
            border-radius: 12px;
            padding: 10px 12px;
            text-align: center;
            min-width: 0;
        }
        .rail-meta-chip.wide { flex: 2; }
        .chip-label {
            font-size: 10px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chip-value {
            font-size: 15px;
            font-weight: 700;
            color: #111827;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chip-value.green { color: #16A34A; }

        /* ── Action buttons ── */
        .action-section {
            padding: 14px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeUp 0.4s 0.3s ease both;
        }

        .secondary-row {
            display: flex;
            gap: 10px;
        }
        .btn-secondary {
            flex: 1;
            padding: 14px 12px;
            background: #fff;
            color: #374151;
            border: 1.5px solid #E5E7EB;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s;
            text-decoration: none;
            min-width: 0;
        }
        .btn-secondary:active { transform: scale(0.975); }
        .btn-secondary svg { width: 16px; height: 16px; color: #6B7280; flex-shrink: 0; }
        .btn-secondary.btn-flag svg { color: #D97706; }

        .btn-next-rail {
            width: 100%;
            padding: 18px 20px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
        }
        .btn-next-rail:active { transform: scale(0.975); box-shadow: 0 2px 6px rgba(37,99,235,0.2); }

        .btn-label-wrap { text-align: left; }
        .btn-eyebrow {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.75;
            letter-spacing: 0.3px;
        }
        .btn-main-text {
            font-size: 16px;
            font-weight: 700;
            margin-top: 1px;
        }

        .btn-arrow-circle {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .btn-arrow-circle svg { width: 18px; height: 18px; }

        /* ── Physical install reminder ── */
        .install-reminder {
            margin: 14px 20px 0;
            background: #FFFBEB;
            border: 1.5px solid #FDE68A;
            border-radius: 14px;
            padding: 10px 12px 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeUp 0.4s 0.18s ease both;
        }
        .install-reminder-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .install-reminder-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .install-reminder-icon svg {
            width: 22px;
            height: 22px;
            color: #78350F;
        }
        .install-reminder-text {
            font-size: 14px;
            line-height: 1.25;
            color: #78350F;
            font-weight: 700;
            min-width: 0;
        }
        .install-reminder-guide {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 6px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.6);
            border: 1.5px solid #FCD34D;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
            flex-shrink: 0;
            min-width: 64px;
        }
        .install-reminder-guide:active { transform: scale(0.96); background: rgba(255,255,255,0.9); }
        .install-reminder-guide svg {
            width: 32px;
            height: 32px;
            color: #2563EB;
            stroke-width: 1.8;
        }
        .install-reminder-guide-label {
            font-size: 11px;
            font-weight: 700;
            color: #6B7280;
            letter-spacing: 0.3px;
        }

        /* ── Flag toast — slides in from right, vertically centered ── */
        .flag-toast {
            position: fixed;
            top: 50%;
            right: 20%;
            transform: translate(120%, -50%);
            width: 30vw;
            min-width: 220px;
            max-width: 320px;
            background: #FFFBEB;
            border: 1.5px solid #FCD34D;
            border-radius: 16px;
            padding: 16px 16px 14px;
            box-shadow: 0 12px 32px rgba(120, 53, 15, 0.18);
            z-index: 500;
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.25s;
            opacity: 0;
            font-family: 'DM Sans', sans-serif;
        }
        .flag-toast.open {
            transform: translate(0, -50%);
            opacity: 1;
        }
        .flag-toast-close {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: none;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #92400E;
            padding: 0;
        }
        .flag-toast-close:active { background: rgba(146, 64, 14, 0.1); }
        .flag-toast-close svg { width: 14px; height: 14px; }
        .flag-toast-icon {
            width: 32px;
            height: 32px;
            background: #FEF3C7;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .flag-toast-icon svg { width: 18px; height: 18px; color: #D97706; }
        .flag-toast-title {
            font-size: 14px;
            font-weight: 800;
            color: #78350F;
            margin-bottom: 2px;
        }
        .flag-toast-flagged {
            font-size: 13px;
            color: #92400E;
            font-weight: 500;
            line-height: 1.4;
        }
        .flag-toast-flagged strong {
            font-weight: 700;
            color: #78350F;
        }
        .flag-toast-next {
            font-size: 13px;
            color: #92400E;
            font-weight: 500;
            line-height: 1.4;
            margin-top: 4px;
        }
        .flag-toast-next strong {
            font-weight: 700;
            color: #78350F;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>

</head>
<body>

<div class="phone-shell">

    <!-- Top bar -->
    <div class="top-bar" style="position:relative;">
        <div class="top-bar-spacer"></div>
        <a href="flow_pick.html" style="position:absolute;left:50%;transform:translateX(-50%);width:38px;height:38px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);text-decoration:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <div class="top-bar-right">
            <div class="aisle-chip" id="topPill">—</div>
            <div class="avatar">CW</div>
        </div>
    </div>

    <!-- Success graphic -->
    <div class="success-section">
        <div class="check-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <div class="success-title">Rail Registered</div>
        <div class="success-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l2.5 2.5L16 9"/></svg>
            Online &amp; Active
        </div>
    </div>

    <!-- Rail summary card -->
    <div class="rail-card">
        <div class="rail-card-label">Just Registered</div>
        <div class="rail-meta-row">
            <div class="rail-meta-chip">
                <div class="chip-label">Aisle</div>
                <div class="chip-value" id="chipAisle">—</div>
            </div>
            <div class="rail-meta-chip">
                <div class="chip-label">Section</div>
                <div class="chip-value" id="chipSection">—</div>
            </div>
            <div class="rail-meta-chip wide">
                <div class="chip-label">Rail ID</div>
                <div class="chip-value green" id="chipRailId">—</div>
            </div>
        </div>
    </div>

    <!-- Physical install reminder -->
    <div class="install-reminder">
        <div class="install-reminder-left">
            <div class="install-reminder-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                </svg>
            </div>
            <div class="install-reminder-text">Please Complete the Physical Install</div>
        </div>
        <a href="instructions_rail.html?return=install_success" class="install-reminder-guide" aria-label="View Installation Guide">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                <line x1="15" y1="8" x2="19" y2="8"/>
                <line x1="15" y1="11" x2="19" y2="11"/>
                <line x1="15" y1="14" x2="18" y2="14"/>
            </svg>
            <div class="install-reminder-guide-label">Guide</div>
        </a>
    </div>

    <!-- Action buttons -->
    <div class="action-section">

        <!-- Continue installing next rail in same section -->
        <button class="btn-next-rail" onclick="goNextRail()">
            <div class="btn-label-wrap">
                <div class="btn-eyebrow">Install Next Rail</div>
                <div class="btn-main-text" id="nextRailLabel">Next Rail in Section</div>
            </div>
            <div class="btn-arrow-circle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </div>
        </button>

        <!-- Secondary peer actions -->
        <div class="secondary-row">
            <button class="btn-secondary btn-flag" onclick="openFlagModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                <span>Skip this rail</span>
            </button>
            <a href="install_aisle.html" class="btn-secondary">
                <span>Start a New Aisle</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </a>
        </div>

    </div>

</div>

<script>
    const aisle   = sessionStorage.getItem('selectedAisle')   || '—';
    const section = sessionStorage.getItem('selectedSection') || '—';
    const railId  = sessionStorage.getItem('scannedRailId')   || '—';

    document.getElementById('chipAisle').textContent   = aisle;
    document.getElementById('chipSection').textContent = section;
    document.getElementById('chipRailId').textContent  = railId;
    document.getElementById('topPill').textContent     = aisle + '-' + section;

    // Get ordered section list for current aisle — from sessionStorage or fallback logic
    function getAisleSections() {
        try {
            const stored = sessionStorage.getItem('aisleSections_' + aisle);
            if (stored) return JSON.parse(stored);
        } catch(e) {}
        return null;
    }

    // Advance to next section — uses stored list if available, falls back to pattern matching
    function nextSectionId(sec) {
        if (!sec || sec === '—') return null;
        const list = getAisleSections();
        if (list && list.length > 0) {
            const idx = list.indexOf(sec);
            if (idx === -1) return null;
            return idx + 1 < list.length ? list[idx + 1] : null;
        }
        // Fallback: pattern matching
        if (sec.endsWith('-L')) return sec.replace('-L', '-R');
        if (sec.endsWith('-R')) {
            const base = parseInt(sec.replace('-R',''), 10);
            return isNaN(base) ? null : String(base + 1);
        }
        const n = parseInt(sec, 10);
        return isNaN(n) ? null : String(n + 1);
    }

    const nextSection = nextSectionId(section);

    if (nextSection) {
        document.getElementById('nextRailLabel').textContent = 'Aisle ' + aisle + '  ·  Section ' + nextSection;
    } else {
        document.getElementById('nextRailLabel').textContent = 'Install Another Rail';
    }

    function goNextRail() {
        if (nextSection) sessionStorage.setItem('selectedSection', nextSection);
        window.location.href = 'install_battery.html';
    }

    function openFlagModal() {
        const skipSec = nextSection || section;
        document.getElementById('flagSecInput').value = aisle + '-' + skipSec;
        document.getElementById('flagNotes').value = '';
        document.getElementById('flagModal').classList.add('open');
    }

    function closeFlagModal() {
        document.getElementById('flagModal').classList.remove('open');
    }

    function submitFlag() {
        const notes = document.getElementById('flagNotes').value.trim();
        if (!notes) { document.getElementById('flagNotes').focus(); return; }

        const skipSec   = nextSection || section;
        const afterSkip = nextSectionId(skipSec);

        // Store flag for supervisor review
        const flags = JSON.parse(sessionStorage.getItem('installFlags') || '[]');
        flags.push({ aisle, section: skipSec, notes, ts: Date.now(), installer: 'CW' });
        sessionStorage.setItem('installFlags', JSON.stringify(flags));

        // Mark skipped section as flagged in section state
        try {
            const key  = 'sectionState_' + aisle;
            const data = JSON.parse(sessionStorage.getItem(key) || '{"installed":[],"flagged":{}}');
            data.installed = (data.installed || []).filter(s => s !== skipSec);
            data.flagged   = data.flagged || {};
            data.flagged[skipSec] = notes;
            sessionStorage.setItem(key, JSON.stringify(data));
        } catch(e) {}

        closeFlagModal();

        // Advance past the skipped section
        if (afterSkip) {
            sessionStorage.setItem('selectedSection', afterSkip);
            document.getElementById('topPill').textContent = aisle + '-' + afterSkip;
            document.getElementById('nextRailLabel').textContent =
                'Aisle ' + aisle + '  ·  Section ' + afterSkip;
            document.getElementById('flagSecInput').value = aisle + '-' + (afterSkip + 1 <= 30 ? afterSkip + 1 : afterSkip);
            showFlagToast(aisle + '-' + skipSec, aisle + '-' + afterSkip);
        } else {
            showFlagToast(aisle + '-' + skipSec, null);
            setTimeout(() => { window.location.href = 'install_aisle.html'; }, 2500);
        }
    }

    function showFlagToast(flaggedId, nextId) {
        // Remove any existing toast first
        const existing = document.querySelector('.flag-toast');
        if (existing) existing.remove();

        const t = document.createElement('div');
        t.className = 'flag-toast';
        const nextLine = nextId
            ? `<div class="flag-toast-next">Now moving to <strong>${nextId}</strong></div>`
            : `<div class="flag-toast-next">Returning to aisle select…</div>`;
        t.innerHTML = `
            <button class="flag-toast-close" aria-label="Dismiss">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div class="flag-toast-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
            </div>
            <div class="flag-toast-title">Rail Flagged</div>
            <div class="flag-toast-flagged"><strong>${flaggedId}</strong> recorded</div>
            ${nextLine}
        `;
        document.body.appendChild(t);

        // Animate in
        requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('open')));

        // Dismiss handler
        const dismiss = () => {
            t.classList.remove('open');
            setTimeout(() => t.remove(), 250);
        };
        t.querySelector('.flag-toast-close').addEventListener('click', dismiss);

        // Auto-dismiss
        setTimeout(dismiss, 4000);
    }
</script>

<!-- Flag modal -->
<div class="flag-overlay" id="flagModal">
    <div class="flag-sheet">
        <div class="flag-icon-wrap">🚩</div>
        <div class="flag-title">Skip This Rail</div>
        <div class="flag-body">Describe what's preventing installation. A supervisor will review this flag.</div>
        <div class="flag-field-label">Section</div>
        <input type="text" class="flag-input" id="flagSecInput" readonly>
        <div class="flag-field-label">Notes</div>
        <textarea class="flag-input" id="flagNotes" rows="3" placeholder="e.g. Shelf bracket missing, can't mount rail"></textarea>
        <div class="flag-btns">
            <button class="flag-cancel" onclick="closeFlagModal()">Cancel</button>
            <button class="flag-submit" onclick="submitFlag()">Submit &amp; Skip</button>
        </div>
    </div>
</div>

</body>
</html>
