<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion - All Issues Map</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F2F3F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #F2F3F7;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 8px;
            flex-shrink: 0;
        }
        .btn-back {
            width: 38px; height: 38px;
            background: #fff; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-decoration: none; transition: transform 0.15s;
        }
        .btn-back:active { transform: scale(0.93); }
        .btn-back svg { width: 16px; height: 16px; color: #374151; }
        .avatar {
            width: 40px; height: 40px; background: #2563EB; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 14px; font-weight: 700;
        }

        .category-chip {
            margin: 16px 20px 0;
            background: #fff;
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            flex-shrink: 0;
            animation: fadeUp 0.4s ease both;
        }
        .chip-left { display: flex; align-items: center; gap: 12px; }
        .chip-icon {
            width: 40px; height: 40px; border-radius: 12px;
            background: #EFF6FF;
            display: flex; align-items: center; justify-content: center;
        }
        .chip-icon svg { width: 20px; height: 20px; color: #2563EB; }
        .chip-label { font-size: 16px; font-weight: 700; color: #111827; }
        .chip-count { font-size: 28px; font-weight: 700; color: #111827; line-height: 1; }

        .map-section {
            margin: 14px 20px 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            animation: fadeUp 0.4s 0.1s ease both;
        }
        .map-hint {
            font-size: 12px; color: #9CA3AF; font-weight: 500;
            margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
            flex-shrink: 0;
        }
        .map-hint svg { width: 13px; height: 13px; }

        /* Viewport clips the map */
        .map-viewport {
            flex: 1;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            position: relative;
            min-height: 300px;
            cursor: grab;
            touch-action: none;
        }
        .map-viewport:active { cursor: grabbing; }

        /* Canvas is what we scale/translate */
        .map-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform-origin: 0 0;
            will-change: transform;
        }

        .map-img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Cluster pin */
        .pin-wrap {
            position: absolute;
            transform: translate(-50%, -100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .pin-cluster {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .pin-cluster svg { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.3)); }
        .pin-cluster .pin-num {
            position: absolute;
            top: 6px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            pointer-events: none;
        }

        /* Individual pins — hidden by default, shown when zoomed */
        .pin-individual {
            position: absolute;
            transform: translate(-50%, -100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, left 0.2s ease, top 0.2s ease;
        }
        .pin-individual svg { filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }
        .pin-individual .pin-label {
            background: #fff;
            border: 1.5px solid #E5E7EB;
            border-radius: 6px;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: 700;
            color: #374151;
            margin-top: 2px;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        /* When zoomed past threshold */
        .zoomed-in .pin-cluster  { opacity: 0; pointer-events: none; }
        .zoomed-in .pin-individual { opacity: 1; pointer-events: auto; }

        .zoom-badge {
            position: absolute;
            bottom: 10px; right: 10px;
            background: rgba(255,255,255,0.92);
            border-radius: 8px;
            padding: 3px 9px;
            font-size: 11px;
            font-weight: 700;
            color: #6B7280;
            pointer-events: none;
            backdrop-filter: blur(4px);
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        }

        .bottom-nav {
            padding: 14px 20px 32px;
            display: flex;
            gap: 12px;
            flex-shrink: 0;
            animation: fadeUp 0.4s 0.15s ease both;
        }
        .btn-nav-back {
            width: 48px; height: 48px; border-radius: 14px;
            background: #fff; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-decoration: none; transition: transform 0.15s; flex-shrink: 0;
        }
        .btn-nav-back:active { transform: scale(0.93); }
        .btn-nav-back svg { width: 16px; height: 16px; color: #374151; }
        .btn-list {
            flex: 1; padding: 15px;
            background: #2563EB; color: #fff;
            border: none; border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px; font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
            text-decoration: none; transition: transform 0.15s;
        }
        .btn-list:active { transform: scale(0.975); }
        .btn-list svg { width: 16px; height: 16px; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<script>
const viewport = document.getElementById('mapViewport');
const canvas   = document.getElementById('mapCanvas');
const CLUSTER_THRESHOLD = 2.0;
const MAX_SCALE = 5;

let scale = 1, panX = 0, panY = 0;

function clamp(val, min, max) { return Math.min(max, Math.max(min, val)); }

function applyTransform(newScale, newPanX, newPanY, animate) {
    const vw = viewport.offsetWidth;
    const vh = viewport.offsetHeight;
    newScale = clamp(newScale, 1, MAX_SCALE);
    newPanX  = clamp(newPanX, vw - vw * newScale, 0);
    newPanY  = clamp(newPanY, vh - vh * newScale, 0);
    scale = newScale; panX = newPanX; panY = newPanY;

    canvas.style.transition = animate ? 'transform 0.28s ease' : 'none';
    canvas.style.transform  = `translate(${panX}px,${panY}px) scale(${scale})`;
    document.getElementById('zoomBadge').textContent = scale.toFixed(1) + '×';

    const zoomed = scale >= CLUSTER_THRESHOLD;
    document.querySelectorAll('.pin-wrap').forEach(wrap => {
        wrap.classList.toggle('zoomed-in', zoomed);
    });
    positionPins();
}

function positionPins() {
    const vw = viewport.offsetWidth;
    const vh = viewport.offsetHeight;
    const spread = Math.max(1, (scale / CLUSTER_THRESHOLD) * 1.4);

    document.querySelectorAll('.pin-wrap').forEach(wrap => {
        wrap.style.left = (parseFloat(wrap.dataset.x) / 100 * vw) + 'px';
        wrap.style.top  = (parseFloat(wrap.dataset.y) / 100 * vh) + 'px';

        wrap.querySelectorAll('.pin-individual').forEach(pin => {
            pin.style.left = (parseFloat(pin.dataset.ox) * spread * 3.5) + 'px';
            pin.style.top  = (parseFloat(pin.dataset.oy) * spread * 3.5) + 'px';
        });
    });
}

/* ── Touch ── */
let t1 = null, t2 = null, isTwoFinger = false;
let startDist, startScale, startPanX, startPanY, startMidX, startMidY;
let singleStartX, singleStartY;

viewport.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1 && !isTwoFinger) {
        t1 = e.touches[0];
        singleStartX = t1.clientX; singleStartY = t1.clientY;
        startPanX = panX; startPanY = panY;
    }
    if (e.touches.length === 2) {
        isTwoFinger = true;
        t1 = e.touches[0]; t2 = e.touches[1];
        startDist  = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
        startScale = scale;
        const rect = viewport.getBoundingClientRect();
        startMidX = (t1.clientX + t2.clientX) / 2 - rect.left;
        startMidY = (t1.clientY + t2.clientY) / 2 - rect.top;
        startPanX = panX; startPanY = panY;
    }
}, { passive: false });

viewport.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 2) {
        const a = e.touches[0], b = e.touches[1];
        const dist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
        const ns   = startScale * (dist / startDist);
        const rect = viewport.getBoundingClientRect();
        const mx   = (a.clientX + b.clientX) / 2 - rect.left;
        const my   = (a.clientY + b.clientY) / 2 - rect.top;
        const r    = ns / startScale;
        applyTransform(ns, mx - r * (startMidX - startPanX), my - r * (startMidY - startPanY), false);
    } else if (e.touches.length === 1 && !isTwoFinger) {
        const t = e.touches[0];
        applyTransform(scale, startPanX + t.clientX - singleStartX, startPanY + t.clientY - singleStartY, false);
    }
}, { passive: false });

viewport.addEventListener('touchend', e => {
    if (e.touches.length < 2) isTwoFinger = false;
    if (e.touches.length === 1) {
        t1 = e.touches[0];
        singleStartX = t1.clientX; singleStartY = t1.clientY;
        startPanX = panX; startPanY = panY;
    }
});

/* ── Double-tap ── */
let lastTap = 0;
viewport.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 280 && e.changedTouches.length === 1) {
        const t = e.changedTouches[0];
        const rect = viewport.getBoundingClientRect();
        const tx = t.clientX - rect.left, ty = t.clientY - rect.top;
        if (scale > 1.5) {
            applyTransform(1, 0, 0, true);
        } else {
            const ns = 3;
            applyTransform(ns, tx - ns * tx, ty - ns * ty, true);
        }
    }
    lastTap = now;
});

/* ── Mouse (desktop) ── */
let md = false, msX, msY, msPX, msPY;
viewport.addEventListener('mousedown', e => { md = true; msX = e.clientX; msY = e.clientY; msPX = panX; msPY = panY; });
window.addEventListener('mousemove',   e => { if (md) applyTransform(scale, msPX + e.clientX - msX, msPY + e.clientY - msY, false); });
window.addEventListener('mouseup',    () => md = false);
viewport.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const d  = e.deltaY > 0 ? 0.85 : 1.15;
    applyTransform(scale * d, mx - d * (mx - panX), my - d * (my - panY), false);
}, { passive: false });

window.addEventListener('resize', () => applyTransform(scale, panX, panY, false));
positionPins();
</script>
</body>
