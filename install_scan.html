<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vusion - Scan Rail</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F2F3F7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }

        .phone-shell {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            background: #F2F3F7;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 16px 20px 8px;
        }


        /* Top bar right group — aisle chip + avatar */
        .top-bar-right { display: flex; align-items: center; gap: 8px; }
        .aisle-chip { background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 10px; padding: 6px 10px; font-size: 14px; font-weight: 800; color: #2563EB; letter-spacing: 0.3px; line-height: 1; min-height: 28px; display: flex; align-items: center; }

        .back-btn {
            width: 38px;
            height: 38px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .back-btn svg { width: 18px; height: 18px; color: #111827; }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        /* ── Hero ── */
        .hero {
            padding: 16px 20px 0;
            animation: fadeUp 0.4s ease both;
        }
        .hero-title { font-size: 24px; font-weight: 700; color: #111827; line-height: 1.2; }
        .hero-sub { font-size: 14px; color: #6B7280; margin-top: 4px; line-height: 1.5; }

        /* ── Scanner window ── */
        .scanner-card {
            margin: 18px 20px 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.10);
            position: relative;
            background: #000;
            animation: fadeUp 0.4s 0.1s ease both;
            height: 210px;
        }

        .scanner-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0; left: 0;
        }

        /* Corner brackets */
        .scanner-card::before,
        .scanner-card::after {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            z-index: 5;
        }
        .scanner-card::before {
            top: 12px; left: 12px;
            border-top: 3px solid #2563EB;
            border-left: 3px solid #2563EB;
            border-radius: 4px 0 0 0;
        }
        .scanner-card::after {
            bottom: 12px; right: 12px;
            border-bottom: 3px solid #2563EB;
            border-right: 3px solid #2563EB;
            border-radius: 0 0 4px 0;
        }

        /* Extra corners via inner div */
        .scanner-corners::before,
        .scanner-corners::after {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            z-index: 5;
        }
        .scanner-corners::before {
            top: 12px; right: 12px;
            border-top: 3px solid #2563EB;
            border-right: 3px solid #2563EB;
            border-radius: 0 4px 0 0;
        }
        .scanner-corners::after {
            bottom: 12px; left: 12px;
            border-bottom: 3px solid #2563EB;
            border-left: 3px solid #2563EB;
            border-radius: 0 0 0 4px;
        }
        .scanner-corners {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* Laser line */
        .laser-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #EF4444 20%, #EF4444 80%, transparent 100%);
            position: absolute;
            top: 0;
            z-index: 10;
            animation: scan 2s infinite linear;
            box-shadow: 0 0 8px rgba(239,68,68,0.8);
            display: none;
        }
        @keyframes scan { 0% { top: 10%; } 100% { top: 90%; } }

        /* Complete overlay — entire area is the button */
        .complete-ui {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #fff;
            border: 3px solid #16A34A;
            border-radius: 18px;
            position: absolute;
            top: 0; left: 0;
            z-index: 20;
            gap: 10px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .complete-ui:active { background: #F0FDF4; }

        .complete-check {
            width: 64px;
            height: 64px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #16A34A;
        }
        .complete-check svg { width: 32px; height: 32px; color: #16A34A; }

        .complete-label {
            font-size: 15px;
            font-weight: 700;
            color: #16A34A;
            letter-spacing: 0.5px;
        }

        .complete-cta {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #16A34A;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            padding: 10px 18px;
            border-radius: 999px;
            box-shadow: 0 4px 14px rgba(22,163,74,0.35);
            margin-top: 4px;
            animation: ctaPulse 1.8s ease-in-out infinite;
            pointer-events: none;
        }
        .complete-cta svg { width: 16px; height: 16px; color: #fff; }
        .complete-ui:active .complete-cta { transform: scale(0.97); animation: none; }

        @keyframes ctaPulse {
            0%, 100% { box-shadow: 0 4px 14px rgba(22,163,74,0.35); transform: scale(1); }
            50%      { box-shadow: 0 6px 22px rgba(22,163,74,0.55); transform: scale(1.04); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.2); }
            60% { transform: scale(0.92); }
            80% { transform: scale(1.06); }
        }
        .bounce-trigger { animation: bounce 0.55s ease; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .shake-trigger { animation: shake 0.4s ease-in-out; }

        /* Scanner sub-row */
        .scanner-sub {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px 0;
        }

        .btn-text-link {
            background: none;
            border: none;
            color: #6B7280;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
            padding: 0;
        }
        .btn-text-link:disabled,
        .btn-text-link.hidden { visibility: hidden; }

        /* ── Rail ID status card ── */
        .rail-id-card {
            margin: 12px 20px 0;
            background: #fff;
            border-radius: 14px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            animation: fadeUp 0.4s 0.15s ease both;
            transition: border-color 0.3s;
            border: 1.5px solid #E5E7EB;
        }

        .rail-id-card.found {
            border-color: #86EFAC;
            background: #F0FDF4;
        }

        .rail-id-text { flex: 1; }
        .rail-id-label {
            font-size: 10px;
            font-weight: 700;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .rail-id-card.found .rail-id-label { color: #16A34A; }
        .rail-id-value {
            font-size: 15px;
            font-weight: 700;
            color: #9CA3AF;
            margin-top: 2px;
            font-family: monospace;
            letter-spacing: 1px;
        }
        .rail-id-card.found .rail-id-value { color: #111827; }

        .rail-id-badge {
            font-size: 11px;
            font-weight: 700;
            color: #9CA3AF;
            background: #F3F4F6;
            padding: 4px 10px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .rail-id-card.found .rail-id-badge {
            color: #16A34A;
            background: #DCFCE7;
        }

        /* Rail ID image */
        .rail-id-img-wrap {
            width: 56px;
            height: 36px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background: #F3F4F6;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .rail-id-card.found .rail-id-img-wrap { background: #DCFCE7; }
        .rail-id-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .rail-id-img-fallback {
            display: none;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .rail-id-img-fallback svg { width: 28px; height: 28px; color: #9CA3AF; }
        .rail-id-card.found .rail-id-img-fallback svg { color: #16A34A; }

        /* ── Scan location hint card (image only, no caption) ── */
        .hint-card {
            margin: 12px 20px 0;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            animation: fadeUp 0.4s 0.2s ease both;
        }
        .hint-card img {
            width: 100%;
            height: auto;
            display: block;
        }
        .hint-placeholder {
            width: 100%;
            height: 100px;
            background: linear-gradient(135deg, #e0e7ef, #c7d2e0);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .hint-placeholder svg { width: 32px; height: 32px; color: #94A3B8; }
        .hint-placeholder span { font-size: 12px; color: #94A3B8; font-weight: 500; }

        /* ── Nav area ── */
        .nav-area {
            padding: 14px 20px 20px;
            display: flex;
            gap: 12px;
            animation: fadeUp 0.4s 0.25s ease both;
        }

        .btn-back-nav {
            padding: 15px 20px;
            background: #fff;
            color: #6B7280;
            border: 1.5px solid #E5E7EB;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: transform 0.15s;
            flex-shrink: 0;
        }
        .btn-back-nav:active { transform: scale(0.975); }
        .btn-back-nav svg { width: 16px; height: 16px; }

        .btn-next {
            flex: 1;
            padding: 15px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
        }
        .btn-next:active { transform: scale(0.975); box-shadow: 0 2px 6px rgba(37,99,235,0.2); }
        .btn-next svg { width: 18px; height: 18px; }

        /* ── Animations ── */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        /* ── Real-camera scanner additions ── */
        .qr-reader-mount {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
        }
        /* Force the html5-qrcode video to fill the card */
        .qr-reader-mount video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            display: block;
        }
        /* Hide html5-qrcode's default UI scaffolding */
        .qr-reader-mount > div { border: none !important; }
        #qr-shaded-region { display: none !important; }

        .camera-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #1F2937;
            color: #D1D5DB;
            z-index: 4;
            padding: 20px;
            text-align: center;
        }
        .camera-state.hidden { display: none; }
        .camera-state svg { color: #9CA3AF; }
        .camera-state-text { font-size: 13px; font-weight: 600; line-height: 1.4; }
        .camera-retry-btn {
            margin-top: 4px;
            padding: 8px 18px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .camera-retry-btn.hidden { display: none; }

        .torch-btn {
            position: absolute;
            top: 12px;
            right: 50px; /* leaves space for top-right corner bracket */
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.55);
            border: 1.5px solid rgba(255,255,255,0.3);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 6;
            transition: background .15s, transform .12s;
        }
        .torch-btn:active { transform: scale(0.93); }
        .torch-btn.on { background: #F59E0B; border-color: #F59E0B; color: #fff; }
        .torch-btn.hidden { display: none; }
        .torch-btn svg { width: 18px; height: 18px; }

        /* Shake on invalid scan */
        .scanner-card.shake {
            animation: scanShake 0.35s ease;
        }
        @keyframes scanShake {
            0%, 100% { transform: translateX(0); }
            15%      { transform: translateX(-8px); }
            30%      { transform: translateX(7px); }
            45%      { transform: translateX(-5px); }
            60%      { transform: translateX(4px); }
            80%      { transform: translateX(-2px); }
        }
        .scanner-card.shake::before,
        .scanner-card.shake::after,
        .scanner-card.shake .scanner-corners::before,
        .scanner-card.shake .scanner-corners::after {
            border-color: #EF4444 !important;
            transition: border-color 0.15s;
        }

        /* ── Manual Entry modal ── */
        .manual-overlay {
            position: fixed;
            inset: 0;
            background: rgba(17,24,39,0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            padding: 20px;
        }
        .manual-overlay.open { display: flex; }
        .manual-sheet {
            background: #fff;
            width: 100%;
            max-width: 340px;
            border-radius: 22px;
            padding: 22px 20px 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .manual-title {
            font-size: 18px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 4px;
        }
        .manual-sub {
            font-size: 13px;
            color: #6B7280;
            font-weight: 500;
            margin-bottom: 14px;
        }
        .manual-input {
            width: 100%;
            padding: 14px 16px;
            background: #F9FAFB;
            border: 1.5px solid #E5E7EB;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #111827;
            letter-spacing: 1.5px;
            text-align: center;
            outline: none;
            text-transform: uppercase;
        }
        .manual-input:focus { border-color: #2563EB; background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .manual-input.error { border-color: #EF4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }
        .manual-error { min-height: 18px; font-size: 12px; color: #EF4444; font-weight: 600; margin-top: 8px; text-align: center; }
        .manual-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .manual-cancel, .manual-submit {
            flex: 1;
            padding: 13px;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.12s;
        }
        .manual-cancel { background: #fff; color: #6B7280; border: 1.5px solid #E5E7EB; }
        .manual-submit { background: #2563EB; color: #fff; border: none; box-shadow: 0 3px 10px rgba(37,99,235,0.28); }
        .manual-cancel:active, .manual-submit:active { transform: scale(0.975); }

    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563EB">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TopStock">
    <link rel="apple-touch-icon" href="icons/icon-180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

</head>
<body>

<div class="phone-shell">

    <!-- Top bar -->
    <div class="top-bar" style="position:relative;">
        <a href="install_battery.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <a href="flow_pick.html" style="position:absolute;left:50%;transform:translateX(-50%);width:38px;height:38px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);text-decoration:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <div class="top-bar-right">
            <div class="aisle-chip" id="topPill">—</div>
            <div class="avatar">CW</div>
        </div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <div class="hero-title">Scan the Rail</div>
    </div>

    <!-- Scanner window -->
    <div class="scanner-card" id="scannerBox">
        <!-- html5-qrcode mounts the video element here -->
        <div id="qrReader" class="qr-reader-mount"></div>

        <!-- Camera permission / loading state -->
        <div id="cameraState" class="camera-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="36" height="36"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <div id="cameraStateText" class="camera-state-text">Starting camera…</div>
            <button id="cameraRetryBtn" class="camera-retry-btn hidden" onclick="initScanner()">Try Again</button>
        </div>

        <div id="laser" class="laser-line" style="display:none;"></div>
        <div class="scanner-corners"></div>

        <!-- Torch button (Android only — hidden if not supported) -->
        <button id="torchBtn" class="torch-btn hidden" onclick="toggleTorch()" aria-label="Toggle flashlight">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6l-6 6-6-6"/><path d="M6 6h12l-3 9H9z"/><line x1="12" y1="22" x2="12" y2="15"/></svg>
        </button>

        <!-- Complete overlay — whole div is tappable -->
        <div id="completeScreen" class="complete-ui" onclick="validateAndGo()">
            <div class="complete-check" id="completeCheck">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="complete-label">Scan Complete</div>
            <div class="complete-cta">
                Tap to Continue
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </div>
        </div>
    </div>

    <!-- Rescan / Manual Entry row — mirror buttons, only one visible at a time -->
    <div class="scanner-sub">
        <button id="rescanBtn" class="btn-text-link hidden" onclick="initScanner()">Rescan</button>
        <button id="manualEntryBtn" class="btn-text-link" onclick="openManualEntry()">Manual Entry</button>
    </div>

    <!-- Rail ID status card -->
    <div class="rail-id-card" id="railIdCard">
        <div class="rail-id-img-wrap" id="railIdImgWrap">
            <img src="rail-thumbnail.png" id="railIdImg" alt="Rail"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="rail-id-img-fallback" id="railIdImgFallback">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="8" width="20" height="8" rx="2"/>
                    <line x1="5" y1="11" x2="5" y2="13"/>
                    <line x1="8" y1="11" x2="8" y2="13"/>
                    <line x1="11" y1="11" x2="11" y2="13"/>
                    <line x1="14" y1="11" x2="14" y2="13"/>
                </svg>
            </div>
        </div>
        <div class="rail-id-text">
            <div class="rail-id-label">Rail ID</div>
            <div class="rail-id-value" id="railIdValue">Awaiting scan…</div>
        </div>
        <div class="rail-id-badge" id="railIdBadge">Pending</div>
    </div>

    <!-- Scan location hint -->
    <div class="hint-card">
        <img src="simplified-scan-location.png" alt="Scan location guide"
             onerror="this.parentElement.innerHTML='<div class=\'hint-placeholder\'><svg viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'1.5\'><rect x=\'2\' y=\'6\' width=\'20\' height=\'12\' rx=\'2\'/><line x1=\'6\' y1=\'9\' x2=\'6\' y2=\'15\'/><line x1=\'9\' y1=\'9\' x2=\'9\' y2=\'15\'/><line x1=\'12\' y1=\'9\' x2=\'12\' y2=\'12\'/><line x1=\'15\' y1=\'9\' x2=\'15\' y2=\'15\'/></svg><span>simplified-scan-location.png</span></div>'">
    </div>

    <!-- Nav area -->
    <div class="nav-area">
        <a href="install_battery.html" class="btn-back-nav">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            Back
        </a>
        <button class="btn-next" onclick="validateAndGo()">
            Next
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>

</div>

<script>
    const successSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');

    // Validation: 4 alphanumeric, hyphen, 4 alphanumeric (case-insensitive, normalized to upper)
    const RAIL_ID_REGEX = /^[A-Z0-9]{4}-[A-Z0-9]{4}$/;

    let html5QrCode = null;
    let scanCompleted = false;
    let lastInvalidShake = 0;     // debounce for shake animation
    let currentTrack = null;       // active MediaStreamTrack (for torch)
    let torchOn = false;

    // Kick off on page load
    window.addEventListener('load', () => {
        initScanner();
    });

    async function initScanner() {
        scanCompleted = false;
        const stateEl     = document.getElementById('cameraState');
        const stateText   = document.getElementById('cameraStateText');
        const retryBtn    = document.getElementById('cameraRetryBtn');
        const complete    = document.getElementById('completeScreen');
        const rescanBtn   = document.getElementById('rescanBtn');
        const railIdCard  = document.getElementById('railIdCard');
        const railIdValue = document.getElementById('railIdValue');
        const railIdBadge = document.getElementById('railIdBadge');

        // Reset UI state — pre-scan: Manual Entry visible, Rescan hidden
        complete.style.display = 'none';
        rescanBtn.classList.add('hidden');
        document.getElementById('manualEntryBtn').classList.remove('hidden');
        railIdCard.classList.remove('found');
        railIdValue.textContent = 'Awaiting scan…';
        railIdBadge.textContent = 'Pending';
        stateEl.classList.remove('hidden');
        retryBtn.classList.add('hidden');
        stateText.textContent = 'Starting camera…';

        // Stop any existing scanner cleanly
        if (html5QrCode) {
            try { await html5QrCode.stop(); } catch (e) {}
            try { html5QrCode.clear(); } catch (e) {}
            html5QrCode = null;
        }

        // Check for library
        if (typeof Html5Qrcode === 'undefined') {
            stateText.textContent = 'Scanner library failed to load. Use Manual Entry below.';
            retryBtn.classList.remove('hidden');
            return;
        }

        html5QrCode = new Html5Qrcode('qrReader', { verbose: false });

        const config = {
            fps: 12,
            qrbox: undefined,                    // scan full viewport
            aspectRatio: undefined,              // let CSS handle it
            disableFlip: false,                  // try both flipped & unflipped
            formatsToSupport: [
                Html5QrcodeSupportedFormats.QR_CODE,
                Html5QrcodeSupportedFormats.CODE_39,
                Html5QrcodeSupportedFormats.CODE_128,
                Html5QrcodeSupportedFormats.CODE_93,
                Html5QrcodeSupportedFormats.DATA_MATRIX,
            ],
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true   // faster on Android
            }
        };

        try {
            await html5QrCode.start(
                { facingMode: 'environment' },   // back camera
                config,
                handleScanSuccess,
                handleScanFailure
            );
            // Camera started — hide the loading state
            stateEl.classList.add('hidden');
            // Try to set up torch
            setTimeout(setupTorch, 500);
        } catch (err) {
            console.error('Camera init failed:', err);
            // Permission denied or no camera
            if (err && /permission|notallowed|denied/i.test(String(err))) {
                stateText.textContent = 'Camera access denied. Grant permission in browser settings, or use Manual Entry below.';
            } else if (err && /notfound|nocamera/i.test(String(err))) {
                stateText.textContent = 'No camera found on this device. Use Manual Entry below.';
            } else {
                stateText.textContent = 'Could not start camera. Tap to retry, or use Manual Entry below.';
            }
            retryBtn.classList.remove('hidden');
        }
    }

    function handleScanSuccess(decodedText, decodedResult) {
        if (scanCompleted) return;
        const normalized = String(decodedText || '').trim().toUpperCase();

        if (RAIL_ID_REGEX.test(normalized)) {
            scanCompleted = true;
            completeScan(normalized);
        } else {
            // Invalid format — brief shake, keep scanning
            triggerInvalidShake();
        }
    }

    function handleScanFailure(errorMessage) {
        // Called frequently when nothing is in frame — silent, don't log
    }

    function triggerInvalidShake() {
        const now = Date.now();
        if (now - lastInvalidShake < 600) return;  // debounce — one shake per 600ms
        lastInvalidShake = now;
        const card = document.getElementById('scannerBox');
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 400);
    }

    async function completeScan(railId) {
        const complete    = document.getElementById('completeScreen');
        const railIdCard  = document.getElementById('railIdCard');
        const railIdValue = document.getElementById('railIdValue');
        const railIdBadge = document.getElementById('railIdBadge');

        // Sound + haptic
        successSound.play().catch(() => {});
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

        // Stop camera — we've got our scan
        if (html5QrCode) {
            try { await html5QrCode.stop(); } catch (e) {}
        }

        // Show complete overlay
        complete.style.display = 'flex';

        // Swap sub-row buttons: post-scan, Rescan visible, Manual Entry hidden
        document.getElementById('rescanBtn').classList.remove('hidden');
        document.getElementById('manualEntryBtn').classList.add('hidden');

        // Update Rail ID card with REAL scanned value
        railIdCard.classList.add('found');
        railIdValue.textContent = railId;
        railIdBadge.textContent = 'Scanned ✓';

        // Persist scanned rail ID
        sessionStorage.setItem('scannedRailId', railId);

        // Bounce the checkmark
        const checkEl = document.getElementById('completeCheck');
        if (checkEl) {
            checkEl.style.animation = 'none';
            void checkEl.offsetWidth;
            checkEl.style.animation = '';
        }
    }

    // ── Torch (flashlight) ──
    function setupTorch() {
        const btn = document.getElementById('torchBtn');
        try {
            const stream = document.querySelector('#qrReader video')?.srcObject;
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            if (!track) return;
            currentTrack = track;
            const capabilities = track.getCapabilities ? track.getCapabilities() : {};
            if (capabilities.torch) {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');   // iOS Safari typically lacks torch support
            }
        } catch (e) {
            btn.classList.add('hidden');
        }
    }

    async function toggleTorch() {
        if (!currentTrack) return;
        torchOn = !torchOn;
        try {
            await currentTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
            document.getElementById('torchBtn').classList.toggle('on', torchOn);
        } catch (e) {
            console.warn('Torch toggle failed', e);
            torchOn = !torchOn;  // revert state
        }
    }

    // ── Manual Entry ──
    function openManualEntry() {
        const overlay = document.getElementById('manualOverlay');
        const input = document.getElementById('manualInput');
        const err = document.getElementById('manualError');
        input.value = '';
        input.classList.remove('error');
        err.textContent = '';
        overlay.classList.add('open');
        setTimeout(() => input.focus(), 50);
    }

    function closeManualEntry() {
        document.getElementById('manualOverlay').classList.remove('open');
    }

    async function submitManualEntry() {
        const input = document.getElementById('manualInput');
        const err = document.getElementById('manualError');
        const value = input.value.trim().toUpperCase();
        if (!RAIL_ID_REGEX.test(value)) {
            input.classList.add('error');
            err.textContent = 'Enter 4 characters, dash, 4 characters (e.g. Y01R-006M).';
            return;
        }
        closeManualEntry();
        scanCompleted = true;
        completeScan(value);
    }

    // Auto-uppercase manual input as the user types
    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('manualInput');
        if (input) {
            input.addEventListener('input', () => {
                const pos = input.selectionStart;
                input.value = input.value.toUpperCase();
                input.classList.remove('error');
                document.getElementById('manualError').textContent = '';
                // Auto-insert hyphen after 4 chars if user is typing without one
                if (input.value.length === 4 && !input.value.includes('-')) {
                    input.value = input.value + '-';
                    input.setSelectionRange(5, 5);
                } else {
                    input.setSelectionRange(pos, pos);
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') submitManualEntry();
                else if (e.key === 'Escape') closeManualEntry();
            });
        }
    });

    function validateAndGo() {
        window.location.href = 'install_registering.html';
    }
</script>

<script>
    (function() {
        var aisle   = sessionStorage.getItem('selectedAisle')   || '—';
        var section = sessionStorage.getItem('selectedSection') || '—';
        var pill = document.getElementById('topPill');
        if (pill) pill.textContent = aisle + '-' + section;
    })();
</script>
<!-- Manual Entry modal -->
<div class="manual-overlay" id="manualOverlay" onclick="if(event.target===this)closeManualEntry()">
    <div class="manual-sheet">
        <div class="manual-title">Enter Rail ID</div>
        <div class="manual-sub">Type the 9-character ID printed on the rail.</div>
        <input class="manual-input" id="manualInput" type="text" placeholder="XXXX-XXXX" maxlength="9" autocomplete="off" autocapitalize="characters" spellcheck="false">
        <div class="manual-error" id="manualError"></div>
        <div class="manual-actions">
            <button class="manual-cancel" onclick="closeManualEntry()">Cancel</button>
            <button class="manual-submit" onclick="submitManualEntry()">Confirm</button>
        </div>
    </div>
</div>

<!-- html5-qrcode library — loaded from jsDelivr CDN -->
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

</body>
</html>
