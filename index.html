<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion TopStock</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #F2F3F7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; color: #111827; }
        .shell { width: 100%; max-width: 390px; min-height: 100vh; background: #F2F3F7; display: flex; flex-direction: column; align-items: center; padding: 0 20px 40px; }

        .logo-wrap { margin-top: 64px; margin-bottom: 36px; display: flex; flex-direction: column; align-items: center; animation: fadeUp .4s ease both; }
        .logo-wrap img { width: 180px; height: auto; object-fit: contain; }
        .logo-fallback { font-size: 28px; font-weight: 800; color: #2563EB; letter-spacing: -0.5px; display: none; }

        .login-card { width: 100%; background: #fff; border-radius: 24px; padding: 28px 24px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); animation: fadeUp .4s .1s ease both; opacity: 0; }
        .card-title { font-size: 22px; font-weight: 800; color: #111827; margin-bottom: 4px; }
        .card-sub   { font-size: 14px; color: #6B7280; font-weight: 500; margin-bottom: 24px; }

        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .field-label { font-size: 11px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: .5px; }
        .field-input { width: 100%; padding: 14px 16px; background: #F9FAFB; border: 1.5px solid #E5E7EB; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; color: #111827; outline: none; transition: border-color .15s, box-shadow .15s; }
        .field-input:focus { border-color: #2563EB; background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .field-input.error { border-color: #EF4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }
        .field-input::placeholder { color: #9CA3AF; }

        .error-msg { font-size: 13px; color: #EF4444; font-weight: 600; min-height: 18px; margin-bottom: 4px; }

        .btn-login { width: 100%; padding: 16px; background: #2563EB; color: #fff; border: none; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; box-shadow: 0 4px 14px rgba(37,99,235,0.3); transition: transform .15s, opacity .15s; }
        .btn-login:active { transform: scale(.975); }

        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="shell">

    <div class="logo-wrap">
        <img src="logo.png" alt="Vusion"
             onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block';">
        <div class="logo-fallback" id="logoFallback">Vusion</div>
    </div>

    <div class="login-card">
        <div class="card-title">Welcome back</div>
        <div class="card-sub">Sign in to continue to TopStock</div>

        <div class="field">
            <div class="field-label">Email</div>
            <input class="field-input" id="emailInput" type="email" placeholder="you@example.com"
                   autocomplete="email" autocapitalize="off" autocorrect="off">
        </div>

        <div class="field">
            <div class="field-label">Password</div>
            <input class="field-input" id="passwordInput" type="password" placeholder="••••••••"
                   autocomplete="current-password">
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <button class="btn-login" onclick="attemptLogin()">Sign In</button>
    </div>

</div>
<script>
    const emailEl = document.getElementById('emailInput');
    const passEl  = document.getElementById('passwordInput');
    const errEl   = document.getElementById('errorMsg');

    [emailEl, passEl].forEach(el => {
        el.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
        el.addEventListener('input',   () => { errEl.textContent = ''; el.classList.remove('error'); });
    });

    function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()); }

    function attemptLogin() {
        const email = emailEl.value.trim();
        const pass  = passEl.value;
        errEl.textContent = '';
        emailEl.classList.remove('error');
        passEl.classList.remove('error');

        if (!isEmail(email)) {
            emailEl.classList.add('error');
            errEl.textContent = 'Please enter a valid email address.';
            return;
        }
        if (pass.length < 6) {
            passEl.classList.add('error');
            errEl.textContent = 'Password must be at least 6 characters.';
            return;
        }

        sessionStorage.setItem('userName',  email.split('@')[0]);
        sessionStorage.setItem('userEmail', email);
        window.location.href = 'location.html';
    }
</script>
</body>
</html>
