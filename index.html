<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vusion TopStock</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Light grey/blue background from your screenshot */
            background-color: #f0f2f5; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #000;
            /* Prevents scrolling if content fits */
            overflow: hidden; 
        }

        /* Main Content Container */
        .container {
            width: 100%;
            max-width: 400px; /* Standard mobile width */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px; /* Space from top of screen */
            box-sizing: border-box;
        }

        /* Logo Box - matches the centered icon in the screenshot */
        .logo-box {
            width: 140px; 
            height: 140px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin: 0;
            color: #000;
        }

        p.subtitle {
            font-size: 16px;
            color: #333;
            margin-top: 8px;
            margin-bottom: 45px;
        }

        /* Action Buttons - Styled with the yellow border and shadow */
        .action-btn {
            background: #ffffff;
            width: 85%;
            padding: 16px 20px;
            margin-bottom: 20px;
            border-radius: 18px;
            /* Hex code for the soft yellow border in the screenshot */
            border: 3px solid #f9d976; 
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.1s;
            text-decoration: none; 
            box-sizing: border-box;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .btn-icon {
            width: 42px;
            height: 42px;
            object-fit: contain;
            margin-right: 18px;
        }

        .btn-text {
            font-size: 22px;
            font-weight: 500;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="logo-box">
            <img src="topstock_logo.png" alt="Vusion Topstock Logo">
        </div>

        <h1>Vusion Topstock Rail</h1>
        <p class="subtitle">Please Select Below to Begin</p>

        <a href="page2.html" class="action-btn">
            <img src="rail.png" alt="Rail Icon" class="btn-icon"> 
            <span class="btn-text">Installation</span>
        </a>

        <a href="page11.html" class="action-btn">
            <img src="monitoring.png" alt="Monitoring Icon" class="btn-icon">
            <span class="btn-text">Validation</span>
        </a>

        <a href="maint_location.html" class="action-btn">
            <img src="maintenance.png" alt="Maintenance Icon" class="btn-icon">
            <span class="btn-text">Maintenance</span>
        </a>

    </div>

</body>
</html>
