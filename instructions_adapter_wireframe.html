<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion — Wire Frame Adapter</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #F2F3F7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .shell { width: 100%; max-width: 390px; min-height: 100vh; background: #F2F3F7; display: flex; flex-direction: column; padding-bottom: 40px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 8px; }
        .btn-back { width: 38px; height: 38px; background: #fff; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-decoration: none; transition: transform .15s; flex-shrink: 0; }
        .btn-back:active { transform: scale(.93); }
        .btn-back svg { width: 16px; height: 16px; color: #374151; }
        .avatar { width: 40px; height: 40px; background: #2563EB; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; flex-shrink: 0; }
        .hero { padding: 8px 20px 0; animation: fadeUp .4s ease both; }
        .eyebrow { font-size: 11px; font-weight: 700; color: #0D9488; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
        .hero-title { font-size: 26px; font-weight: 800; color: #111827; }
        .hero-sub { font-size: 14px; color: #6B7280; font-weight: 500; margin-top: 6px; }
        .placeholder-card { margin: 20px 20px 0; background: #fff; border-radius: 20px; padding: 32px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; border: 2px dashed #E5E7EB; animation: fadeUp .4s .1s ease both; opacity: 0; }
        .placeholder-icon { width: 64px; height: 64px; background: #F0FDFA; border-radius: 18px; display: flex; align-items: center; justify-content: center; }
        .placeholder-icon svg { width: 32px; height: 32px; color: #0D9488; }
        .placeholder-title { font-size: 17px; font-weight: 800; color: #111827; }
        .placeholder-body { font-size: 13px; color: #9CA3AF; font-weight: 500; line-height: 1.6; max-width: 260px; }
        .nav-area { padding: 24px 20px 0; display: flex; gap: 12px; margin-top: auto; }
        .btn-menu { padding: 15px 20px; background: #fff; color: #6B7280; border: 1.5px solid #E5E7EB; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; transition: transform .15s; flex-shrink: 0; }
        .btn-menu:active { transform: scale(.975); }
        .btn-next { flex: 1; padding: 15px; background: #2563EB; color: #fff; border: none; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 14px rgba(37,99,235,0.3); text-decoration: none; transition: transform .15s; }
        .btn-next:active { transform: scale(.975); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="shell">
    <div class="top-bar">
        <a href="instructions_shelf.html" class="btn-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <div class="avatar" id="avatarEl">CW</div>
    </div>
    <div class="hero">
        <div class="eyebrow">Wire Frame Adapter</div>
        <div class="hero-title">Adapter Install</div>
        <div class="hero-sub">Follow these steps to install the Wire Frame adapter before mounting the rail.</div>
    </div>
    <div class="placeholder-card">
        <div class="placeholder-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
        </div>
        <div class="placeholder-title">Wire Frame Adapter Instructions</div>
        <div class="placeholder-body">Content for this adapter is coming soon. Share the deck for this adapter type and it will be added here.</div>
    </div>
    <div class="nav-area">
        <a href="instructions_shelf.html" class="btn-menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M15 18l-6-6 6-6"/></svg>
            Back
        </a>
        <a href="instructions_rail.html" class="btn-next">
            Next: Install Rail
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 18l6-6-6-6"/></svg>
        </a>
    </div>
</div>
<script>
    const userName = sessionStorage.getItem('userName') || 'CW';
    document.getElementById('avatarEl').textContent = userName.slice(0,2).toUpperCase();
</script>
</body>
</html>
