<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vusion — Power Cycle</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #F2F3F7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .shell { width: 100%; max-width: 390px; min-height: 100vh; background: #F2F3F7; display: flex; flex-direction: column; padding-bottom: 40px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 8px; }
        .btn-back { width: 38px; height: 38px; background: #fff; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-decoration: none; transition: transform .15s; flex-shrink: 0; }
        .btn-back:active { transform: scale(.93); }
        .btn-back svg { width: 16px; height: 16px; color: #374151; }
        .avatar { width: 40px; height: 40px; background: #2563EB; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; flex-shrink: 0; }
        .rail-header { padding: 4px 20px 0; }
        .rail-id-label { font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: .5px; }
        .rail-id { font-size: 28px; font-weight: 800; color: #111827; line-height: 1.1; margin-top: 2px; letter-spacing: .5px; }
        .rail-meta { font-size: 13px; color: #6B7280; font-weight: 500; margin-top: 4px; }

        /* Step card */
        .step-wrap { padding: 16px 20px 0; }
        .step-card { background: #fff; border-radius: 20px; padding: 28px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); text-align: center; }
        .step-icon { width: 72px; height: 72px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; }
        .step-icon svg { width: 36px; height: 36px; }
        .icon-unplug { background: #FEF2F2; }
        .icon-unplug svg { color: #DC2626; }
        .icon-wait   { background: #FFFBEB; }
        .icon-wait svg { color: #D97706; }
        .icon-plug   { background: #F0FDF4; }
        .icon-plug svg { color: #16A34A; }
        .step-eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
        .step-title { font-size: 22px; font-weight: 800; color: #111827; line-height: 1.2; margin-bottom: 12px; }
        .step-desc  { font-size: 15px; color: #6B7280; font-weight: 500; line-height: 1.6; }

        /* Timer */
        .timer-wrap { margin-top: 24px; }
        .timer-ring-wrap { position: relative; width: 120px; height: 120px; margin: 0 auto 12px; }
        .timer-ring-bg { fill: none; stroke: #E5E7EB; stroke-width: 8; }
        .timer-ring-fill { fill: none; stroke: #D97706; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 314; stroke-dashoffset: 0; transition: stroke-dashoffset .9s linear; transform: rotate(-90deg); transform-origin: 60px 60px; }
        .timer-number { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 800; color: #111827; }
        .timer-label  { font-size: 13px; font-weight: 600; color: #9CA3AF; text-align: center; }

        /* Buttons */
        .btn-row-primary   { padding: 16px 20px 0; }
        .btn-row-secondary { padding: 10px 20px 0; }
        .btn-primary { width: 100%; padding: 16px; color: #fff; border: none; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform .15s; }
        .btn-primary:active { transform: scale(.975); }
        .btn-primary:disabled { opacity: .4; pointer-events: none; }
        .btn-red   { background: #DC2626; box-shadow: 0 4px 14px rgba(220,38,38,0.3); }
        .btn-green { background: #16A34A; box-shadow: 0 4px 14px rgba(22,163,74,0.3); }
        .btn-blue  { background: #2563EB; box-shadow: 0 4px 14px rgba(37,99,235,0.3); }
        .btn-back-nav { width: 100%; padding: 14px; background: #fff; color: #6B7280; border: 1.5px solid #E5E7EB; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; transition: transform .15s; }
        .btn-back-nav:active { transform: scale(.975); }

        @keyframes spin    { to { transform: rotate(360deg); } }
        @keyframes fadeIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .step-card { animation: fadeIn .3s ease both; }
    </style>
</head>
<body>
<div class="shell">
    <div class="top-bar" style="position:relative;">
        <a href="#" class="btn-back" id="backBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
                <a href="flow_pick.html" style="position:absolute;left:50%;transform:translateX(-50%);width:38px;height:38px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);text-decoration:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <div class="avatar" id="avatarEl">CW</div>
    </div>

    <div class="rail-header">
        <div class="rail-id-label">Rail ID</div>
        <div class="rail-id" id="hdrRailId">—</div>
        <div class="rail-meta" id="hdrMeta">—</div>
    </div>

    <!-- Step card — content swapped by JS -->
    <div class="step-wrap">
        <div class="step-card" id="stepCard">
            <!-- populated by renderPhase() -->
        </div>
    </div>

    <div class="btn-row-primary">
        <button class="btn-primary btn-red" id="btnMain" onclick="handleMain()">
            I've Unplugged Both Batteries
        </button>
    </div>
    <div class="btn-row-secondary">
        <a href="#" class="btn-back-nav" id="btnBackNav">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M15 18l-6-6 6-6"/></svg>
            Back
        </a>
    </div>

</div>
<script>
    // phase: 'unplug' | 'wait' | 'plug'
    let phase = 'unplug';
    let timerInterval = null;
    let secondsLeft = 30;
    let _railParams = '';

    function renderPhase() {
        const card = document.getElementById('stepCard');
        const btn  = document.getElementById('btnMain');
        card.style.animation = 'none';
        requestAnimationFrame(() => { card.style.animation = 'fadeIn .3s ease both'; });

        if (phase === 'unplug') {
            card.innerHTML = `
                <div class="step-icon icon-unplug">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="6" width="18" height="12" rx="2"/><path d="M23 13v-2"/><line x1="9" y1="10" x2="9" y2="14"/><line x1="13" y1="10" x2="13" y2="14"/></svg>
                </div>
                <div class="step-eyebrow" style="color:#DC2626;">Step 1 of 3</div>
                <div class="step-title">Unplug Both Batteries</div>
                <div class="step-desc">Pinch the connector and pull straight out. Do both batteries. Do not pull by the wires.</div>`;
            btn.className   = 'btn-primary btn-red';
            btn.textContent = "I've Unplugged Both Batteries";
            btn.disabled    = false;

        } else if (phase === 'wait') {
            card.innerHTML = `
                <div class="step-eyebrow" style="color:#D97706;">Step 2 of 3</div>
                <div class="step-title">Wait 30 Seconds</div>
                <div class="step-desc">Keep both batteries unplugged until the timer reaches zero.</div>
                <div class="timer-wrap">
                    <div class="timer-ring-wrap">
                        <svg width="120" height="120" viewBox="0 0 120 120">
                            <circle class="timer-ring-bg"   cx="60" cy="60" r="50"/>
                            <circle class="timer-ring-fill" id="timerRing" cx="60" cy="60" r="50"/>
                        </svg>
                        <div class="timer-number" id="timerNum">30</div>
                    </div>
                    <div class="timer-label">seconds remaining</div>
                </div>`;
            btn.className = 'btn-primary btn-blue';
            btn.textContent = 'Waiting…';
            btn.disabled = true;
            startTimer();

        } else if (phase === 'plug') {
            card.innerHTML = `
                <div class="step-icon icon-plug">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="6" width="18" height="12" rx="2"/><path d="M23 13v-2"/></svg>
                </div>
                <div class="step-eyebrow" style="color:#16A34A;">Step 3 of 3</div>
                <div class="step-title">Plug Both Batteries Back In</div>
                <div class="step-desc">Push each connector firmly until it clicks. Left pack goes straight into the camera unit. Right pack connects through the extension cable.</div>`;
            btn.className   = 'btn-primary btn-green';
            btn.textContent = 'Both Plugged In — Run Test';
            btn.disabled    = false;

        } else if (phase === 'testing') {
            card.innerHTML = `
                <div class="step-eyebrow" style="color:#2563EB;">Testing</div>
                <div class="step-title">Running Camera Test…</div>
                <div class="step-desc">Checking camera signal. This will take a few seconds.</div>
                <div style="margin-top:28px;display:flex;justify-content:center;">
                    <div style="width:52px;height:52px;border:5px solid #E5E7EB;border-top-color:#2563EB;border-radius:50%;animation:spin 1s linear infinite;"></div>
                </div>`;
            btn.className = 'btn-primary btn-blue';
            btn.textContent = 'Testing…';
            btn.disabled = true;

        } else if (phase === 'pass') {
            card.innerHTML = `
                <div class="step-icon" style="background:#F0FDF4;margin:0 auto 18px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="36" height="36"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="step-eyebrow" style="color:#16A34A;">Camera OK</div>
                <div class="step-title">Test Passed</div>
                <div class="step-desc">Camera is responding normally. The power cycle resolved the issue.</div>`;
            btn.className   = 'btn-primary btn-green';
            btn.textContent = 'Done';
            btn.disabled    = false;
            btn.onclick     = function() { window.location.href = 'rail_detail.html' + _railParams; };

        } else if (phase === 'fail') {
            card.innerHTML = `
                <div class="step-icon" style="background:#FEF2F2;margin:0 auto 18px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="36" height="36"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </div>
                <div class="step-eyebrow" style="color:#DC2626;">Camera Still Failing</div>
                <div class="step-title">Test Failed</div>
                <div class="step-desc">Power cycle did not resolve the issue. The rail will need to be replaced.</div>`;
            btn.className   = 'btn-primary btn-red';
            btn.textContent = 'Replace Rail';
            btn.disabled    = false;
            btn.onclick     = function() { window.location.href = 'rail_camera_uninstall.html' + _railParams + '&from=' + encodeURIComponent('rail_camera.html'); };
        }
    }

    function handleMain() {
        if (phase === 'unplug') {
            phase = 'wait';
            renderPhase();
        } else if (phase === 'plug') {
            phase = 'testing';
            renderPhase();
            // Simulate test — 3s then random pass/fail weighted toward pass
            setTimeout(() => {
                phase = Math.random() > 0.35 ? 'pass' : 'fail';
                renderPhase();
                document.getElementById('btnMain').onclick = null; // handled inside renderPhase
            }, 3000);
        }
    }

    function startTimer() {
        secondsLeft = 30;
        const circumference = 314; // 2 * pi * 50
        updateTimer();

        timerInterval = setInterval(() => {
            secondsLeft--;
            updateTimer();
            if (secondsLeft <= 0) {
                clearInterval(timerInterval);
                phase = 'plug';
                renderPhase();
            }
        }, 1000);
    }

    function updateTimer() {
        const numEl  = document.getElementById('timerNum');
        const ringEl = document.getElementById('timerRing');
        if (!numEl || !ringEl) return;
        const circumference = 314;
        numEl.textContent = secondsLeft;
        ringEl.style.strokeDashoffset = circumference * (1 - secondsLeft / 30);
    }

    (function() {
        const p = new URLSearchParams(window.location.search);
        const aisle   = p.get('aisle')   || 'C3';
        const section = p.get('section') || '2';
        const rail    = p.get('rail')    || 'Z001-0123';
        const store   = sessionStorage.getItem('storeName') || 'Store 0100';
        const userName = sessionStorage.getItem('userName') || 'CW';
        document.getElementById('avatarEl').textContent  = userName.slice(0,2).toUpperCase();
        document.getElementById('hdrRailId').textContent = rail;
        document.getElementById('hdrMeta').textContent   = store + '  ·  ' + aisle + '-' + section;
        _railParams = '?aisle=' + aisle + '&section=' + section + '&rail=' + encodeURIComponent(rail);
        document.getElementById('backBtn').href    = 'rail_camera.html' + _railParams;
        document.getElementById('btnBackNav').href = 'rail_camera.html' + _railParams;
        renderPhase();
    })();
</script>
</body>
</html>
